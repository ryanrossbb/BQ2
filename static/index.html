<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Benefits Comparison</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#0d2a4f;
    --primary-light:#1e4076;
    --primary-pale:#eef3fa;
    --accent:#c9a84c;
    --accent-light:#e8c97a;
    --green:#0f7a3e;
    --green-bg:#e6f7ee;
    --red:#b91c1c;
    --red-bg:#fee2e2;
    --amber-bg:#fef9c3;
    --amber:#854d0e;
    --gray-50:#f9fafb;
    --gray-100:#f3f4f6;
    --gray-200:#e5e7eb;
    --gray-300:#d1d5db;
    --gray-400:#9ca3af;
    --gray-500:#6b7280;
    --gray-600:#4b5563;
    --gray-700:#374151;
    --gray-900:#111827;
    --radius:10px;
    --radius-sm:6px;
    --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg:0 4px 16px rgba(13,42,79,0.08);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f4f8;color:var(--gray-900);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* TOP BAR */
  .topbar{background:var(--primary);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-lg)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--primary)}
  .brand-title{color:white;font-size:15px;font-weight:600;letter-spacing:-0.01em}
  .brand-sub{color:rgba(255,255,255,0.6);font-size:12px;margin-left:8px;font-weight:400}
  .key-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:white;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background 0.15s}
  .key-btn:hover{background:rgba(255,255,255,0.18)}
  .key-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}
  .key-dot.missing{background:#f87171}

  /* MAIN */
  .main{max-width:1200px;margin:0 auto;padding:1.75rem 1.25rem 4rem}

  /* STEPS */
  .steps{display:flex;align-items:center;background:white;border-radius:var(--radius);padding:1rem 1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem}
  .step{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .step-circle{width:30px;height:30px;border-radius:50%;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
  .step-circle.done{background:var(--green-bg);color:var(--green)}
  .step-circle.active{background:var(--primary);color:white;box-shadow:0 0 0 3px rgba(13,42,79,0.12)}
  .step-circle.idle{background:var(--gray-100);color:var(--gray-400);border:1px solid var(--gray-200)}
  .step-text{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .step-text.active{color:var(--gray-900);font-weight:600}
  .step-text.done{color:var(--green)}
  .step-text.idle{color:var(--gray-400)}
  .step-line{flex:0 0 28px;height:1px;background:var(--gray-200);margin:0 6px}

  /* CARDS */
  .card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem 1.5rem;border:1px solid var(--gray-200)}
  .card+.card{margin-top:1rem}
  .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--gray-500);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .card-title-emoji{font-size:14px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

  /* DROP ZONE */
  .drop-zone{border:2px dashed var(--gray-300);border-radius:var(--radius);padding:1.75rem 1rem;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--gray-50)}
  .drop-zone:hover,.drop-zone.over{border-color:var(--primary-light);background:var(--primary-pale)}
  .drop-zone.filled{border-style:solid;border-color:var(--green);background:var(--green-bg)}
  .drop-icon{font-size:28px;margin-bottom:6px}
  .drop-title{font-size:14px;font-weight:500;color:var(--gray-700)}
  .drop-sub{font-size:12px;color:var(--gray-500);margin-top:3px}

  /* FILE LIST */
  .file-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:6px;transition:border-color 0.15s}
  .file-row:hover{border-color:var(--gray-300)}
  .file-row.renewal{background:#fff8e1;border-color:#fde68a}
  .file-icon{font-size:18px;flex-shrink:0}
  .file-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gray-700)}
  .file-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;cursor:pointer;border:1px solid;transition:all 0.15s}
  .file-tag.carrier{background:var(--primary-pale);color:var(--primary);border-color:var(--primary-light)}
  .file-tag.renewal{background:#fef3c7;color:#854d0e;border-color:#fcd34d}
  .file-tag-select{padding:5px 10px;border-radius:var(--radius-sm);background:white;border:1px solid var(--gray-300);font-size:11px;font-weight:500;color:var(--gray-700);cursor:pointer;outline:none}
  .file-tag-select:focus{border-color:var(--primary-light)}
  .file-remove{cursor:pointer;color:var(--gray-400);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;transition:all 0.1s}
  .file-remove:hover{color:var(--red);background:var(--red-bg)}

  /* FORM ELEMENTS */
  .field{margin-bottom:0.75rem}
  .field-label{font-size:12px;font-weight:500;color:var(--gray-700);display:block;margin-bottom:5px}
  input[type=text],input[type=password]{width:100%;height:38px;padding:0 12px;font-size:13px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);color:var(--gray-900);background:white;transition:border-color 0.12s,box-shadow 0.12s}
  input[type=text]:focus,input[type=password]:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(30,64,118,0.1)}

  /* BUTTONS */
  .btn{height:38px;padding:0 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--gray-300);background:white;color:var(--gray-700);transition:all 0.12s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .btn:hover:not(:disabled){background:var(--gray-50);border-color:var(--gray-400)}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .btn-primary{background:var(--primary);color:white;border-color:var(--primary)}
  .btn-primary:hover:not(:disabled){background:var(--primary-light);border-color:var(--primary-light)}
  .btn-accent{background:var(--accent);color:var(--primary);border-color:var(--accent);font-weight:600}
  .btn-accent:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent-light)}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--gray-600)}
  .btn-ghost:hover:not(:disabled){background:var(--gray-100)}

  /* ALERTS */
  .alert{border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
  .alert-error{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5}
  .alert-warn{background:var(--amber-bg);color:var(--amber);border:1px solid #fde047}
  .alert-info{background:var(--primary-pale);color:var(--primary);border:1px solid #bfdbfe}

  /* PROGRESS */
  .progress-row{display:flex;align-items:center;gap:11px;padding:12px 16px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:8px}
  .progress-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .progress-dot.idle{background:var(--gray-300)}
  .progress-dot.active{background:#3b82f6;animation:pulse 1s infinite}
  .progress-dot.done{background:#22c55e}
  .progress-dot.error{background:#ef4444}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .progress-name{flex:1;font-size:13px;font-weight:500}
  .progress-sub{font-size:11px;margin-top:2px}
  .progress-sub.done{color:var(--green)}
  .progress-sub.active{color:var(--primary-light)}
  .progress-sub.error{color:var(--red)}

  /* SELECTION TABLE */
  .selection-summary{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--primary-pale);border:1px solid #bfdbfe;border-radius:var(--radius-sm);margin-bottom:1rem}
  .selection-count{font-size:13px;font-weight:600;color:var(--primary)}
  .selection-hint{font-size:12px;color:var(--gray-500);flex:1}
  .table-wrap{overflow-x:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:white}
  .stbl{border-collapse:collapse;width:100%;font-size:12.5px}
  .stbl th,.stbl td{border-bottom:1px solid var(--gray-100);padding:9px 12px;vertical-align:middle}
  .stbl thead th{background:var(--gray-50);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);text-align:left;border-bottom:2px solid var(--gray-200);position:sticky;top:0;z-index:1}
  .stbl tbody tr{transition:background 0.1s}
  .stbl tbody tr:hover{background:var(--gray-50)}
  .stbl tbody tr.selected{background:var(--primary-pale)}
  .stbl tbody tr.selected:hover{background:#dbeafe}
  .stbl tbody tr.cheapest-in-carrier{position:relative}
  .stbl tbody tr.cheapest-in-carrier td:first-child::before{content:"⭐";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px}
  .stbl tbody tr.cheapest-in-carrier td:nth-child(2){padding-left:24px}
  .col-check{width:36px;text-align:center}
  .col-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
  .col-carrier{font-weight:600;color:var(--primary);min-width:130px;max-width:180px}
  .col-plan{min-width:160px;max-width:240px;color:var(--gray-700)}
  .col-rate{font-family:"SF Mono",Menlo,monospace;text-align:right;font-size:12px;color:var(--gray-700);min-width:90px}
  .col-savings{text-align:right;min-width:100px}
  .savings-pos{color:var(--green);font-weight:600;font-size:12px}
  .savings-mild{color:#ca8a04;font-weight:500;font-size:12px}
  .savings-neg{color:var(--red);font-weight:500;font-size:12px}
  .savings-na{color:var(--gray-300);font-size:12px}
  .col-deductible{color:var(--gray-600);font-size:12px;min-width:110px}
  .filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap}
  .filter-chip{padding:5px 12px;border:1px solid var(--gray-300);border-radius:14px;font-size:11px;background:white;cursor:pointer;color:var(--gray-600);transition:all 0.1s}
  .filter-chip:hover{border-color:var(--gray-400)}
  .filter-chip.on{background:var(--primary);border-color:var(--primary);color:white}
  .sort-select{height:30px;padding:0 28px 0 10px;font-size:12px;border:1px solid var(--gray-300);border-radius:14px;background:white;cursor:pointer;color:var(--gray-700)}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(13,42,79,0.5);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:white;border-radius:var(--radius);padding:1.75rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--gray-900)}
  .modal-sub{font-size:13px;color:var(--gray-600);margin-bottom:1.25rem;line-height:1.55}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}

  /* COMPLETE */
  .complete{text-align:center;padding:3rem 2rem}
  .complete-icon{font-size:52px;margin-bottom:1rem}
  .complete-title{font-size:22px;font-weight:600;margin-bottom:8px;color:var(--gray-900)}
  .complete-sub{font-size:14px;color:var(--gray-600);margin-bottom:1.75rem;line-height:1.6}

  /* PAGE SELECT */
  .page-card{display:flex;align-items:center;gap:14px;padding:14px 18px;background:white;border-radius:var(--radius-sm);border:1px solid var(--gray-200);margin-bottom:8px}
  .page-card-icon{font-size:22px;flex-shrink:0;width:36px;height:36px;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .page-card-icon.renewal{background:#fef3c7}
  .page-card-info{flex:1;min-width:0}
  .page-card-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .page-card-meta{font-size:11px;color:var(--gray-500);margin-top:2px;display:flex;gap:6px;align-items:center}
  .page-card-tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
  .page-card-tag.carrier{background:var(--primary-pale);color:var(--primary)}
  .page-card-tag.renewal{background:#fef3c7;color:#854d0e}
  .page-card input[type=text]{height:32px;font-size:12px;width:200px}

  /* RATE COMPARISON CARD */
  .rate-comp{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
  .rate-stat{background:var(--gray-50);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--gray-200)}
  .rate-stat-label{font-size:10px;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
  .rate-stat-value{font-size:15px;font-weight:600;color:var(--gray-900);font-family:"SF Mono",Menlo,monospace}
  .rate-stat-value.positive{color:var(--green)}
  .rate-stat-value.negative{color:var(--red)}

  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .spacer{flex:1}
  .hint{font-size:11px;color:var(--gray-500);margin-top:8px;line-height:1.5}

  @media(max-width:780px){
    .grid-2{grid-template-columns:1fr}
    .step-text{display:none}
    .rate-comp{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">📋</div>
    <span class="brand-title">Medical Benefits Comparison</span>
    <span class="brand-sub">Carrier Quote Toolkit</span>
  </div>
  <button class="key-btn" onclick="openKeyModal()">
    <div class="key-dot" id="key-dot"></div>
    <span id="key-label">Set API Key</span>
  </button>
</div>

<!-- API KEY MODAL -->
<div class="modal-bg" id="key-modal">
  <div class="modal">
    <div class="modal-title">🔑 Anthropic API Key</div>
    <div class="modal-sub">
      Your key is forwarded directly to Anthropic and never stored on the server.<br><br>
      Get your key at <a href="https://console.anthropic.com" target="_blank" style="color:var(--primary-light)">console.anthropic.com</a> → API Keys.
    </div>
    <label class="field-label">API Key</label>
    <input type="password" id="key-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <div class="hint" style="margin-top:5px">Starts with sk-ant-</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeKeyModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveKey()">Save Key</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="alerts"></div>
  <div class="steps" id="steps"></div>
  <div id="view"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  step: 0,
  apiKey: "",
  templateFile: null,
  files: [], // {file, role: 'carrier'|'renewal', pageRange, pageCount, status, data, error}
  clientName: "",
  carriers: [], // [{carrier, plans:[]}]
  renewalData: null,
  selectedPlanIds: new Set(), // "ci-pi" identifiers
  filter: "all", // all|competitive|cheapest
  sort: "carrier", // carrier|rate|savings
  error: "",
  warn: "",
};

function set(patch) { Object.assign(S, patch); render(); }

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const STEPS = ["Upload", "Pages", "Extract", "Select Plans", "Generate"];

// ─── KEY MODAL ───────────────────────────────────────────────────────────────
function openKeyModal() {
  document.getElementById("key-modal").classList.add("open");
  document.getElementById("key-input").value = S.apiKey;
}
function closeKeyModal() { document.getElementById("key-modal").classList.remove("open"); }
function saveKey() {
  S.apiKey = document.getElementById("key-input").value.trim();
  closeKeyModal();
  render();
}
function updateKey() {
  const dot = document.getElementById("key-dot"), lbl = document.getElementById("key-label");
  if (!dot) return;
  if (S.apiKey) { dot.className = "key-dot"; lbl.textContent = "API Key Set"; }
  else { dot.className = "key-dot missing"; lbl.textContent = "Set API Key"; }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateKey();

  // Alerts
  const a = document.getElementById("alerts");
  let html = "";
  if (S.error) html += `<div class="alert alert-error">⚠️ ${S.error}</div>`;
  if (S.warn) html += `<div class="alert alert-warn">ℹ️ ${S.warn}</div>`;
  if (S.info) html += `<div class="alert alert-info">📋 ${S.info}</div>`;
  a.innerHTML = html;

  // Steps
  document.getElementById("steps").innerHTML = STEPS.map((s, i) => {
    const st = i < S.step ? "done" : i === S.step ? "active" : "idle";
    return `<div class="step">
      <div class="step-circle ${st}">${st === "done" ? "✓" : i + 1}</div>
      <span class="step-text ${st}">${s}</span>
    </div>${i < STEPS.length - 1 ? '<div class="step-line"></div>' : ''}`;
  }).join("");

  // View
  const v = document.getElementById("view");
  if (S.step === 0) v.innerHTML = viewUpload();
  else if (S.step === 1) v.innerHTML = viewPages();
  else if (S.step === 2) v.innerHTML = viewExtract();
  else if (S.step === 3) v.innerHTML = viewSelect();
  else if (S.step === 4) v.innerHTML = viewComplete();

  attachDropEvents();
}

// ─── STEP 0: UPLOAD ──────────────────────────────────────────────────────────
function viewUpload() {
  const hasTmpl = !!S.templateFile;
  const hasFiles = S.files.length > 0;
  const hasRenewal = S.files.some(f => f.role === 'renewal');
  const hasCarrier = S.files.some(f => f.role === 'carrier');

  return `
  <div class="grid-2" style="margin-bottom:1rem">
    <div class="card">
      <div class="card-title"><span class="card-title-emoji">📊</span> Excel Template</div>
      <div class="drop-zone ${hasTmpl ? 'filled' : ''}" id="dz-tmpl" onclick="document.getElementById('fi-tmpl').click()">
        <input type="file" id="fi-tmpl" accept=".xlsx,.xls" style="display:none" onchange="onTemplateFile(event)">
        <div class="drop-icon">${hasTmpl ? '✅' : '📋'}</div>
        <div class="drop-title">${hasTmpl ? S.templateFile.name : 'Drop branded Excel template'}</div>
        <div class="drop-sub">${hasTmpl ? 'Click to replace' : 'or click to browse (.xlsx)'}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="card-title-emoji">📄</span> Quote Documents</div>
      <div class="drop-zone ${hasFiles ? 'filled' : ''}" id="dz-pdfs" onclick="document.getElementById('fi-pdfs').click()">
        <input type="file" id="fi-pdfs" accept=".pdf" multiple style="display:none" onchange="onPDFFiles(event)">
        <div class="drop-icon">📥</div>
        <div class="drop-title">${hasFiles ? 'Add more documents' : 'Drop PDFs here'}</div>
        <div class="drop-sub">All PDFs first, then tag them below</div>
      </div>
    </div>
  </div>

  ${hasFiles ? `
  <div class="card" style="margin-bottom:1rem">
    <div class="card-title"><span class="card-title-emoji">🏷️</span> Tag each document</div>
    ${!hasRenewal ? '<div class="alert alert-warn" style="margin-bottom:10px">⚠️ Tag one document as <strong>Renewal</strong> to enable savings comparisons.</div>' : ''}
    ${S.files.map((f, i) => `
      <div class="file-row ${f.role === 'renewal' ? 'renewal' : ''}">
        <div class="file-icon">${f.role === 'renewal' ? '🔄' : '📄'}</div>
        <div class="file-name">${escHtml(f.file.name)}</div>
        <select class="file-tag-select" onchange="setFileRole(${i},this.value)">
          <option value="carrier" ${f.role === 'carrier' ? 'selected' : ''}>📄 Carrier Quote</option>
          <option value="renewal" ${f.role === 'renewal' ? 'selected' : ''}>🔄 Current Renewal</option>
        </select>
        <div class="file-remove" onclick="removeFile(${i})" title="Remove">×</div>
      </div>
    `).join('')}
    <div class="hint">Most groups have one renewal document and 1-5 carrier quote documents.</div>
  </div>
  ` : ''}

  <div class="card">
    <div class="card-title"><span class="card-title-emoji">👤</span> Group Details</div>
    <div style="display:flex;gap:1rem;align-items:flex-end">
      <div style="flex:1">
        <label class="field-label">Client Group Name</label>
        <input type="text" id="client-name" placeholder="e.g. Liberty Restoration Group" value="${escHtml(S.clientName)}" oninput="S.clientName=this.value;updateGoBtn()">
      </div>
      <button class="btn btn-primary" id="go-btn" onclick="goToPages()">Continue →</button>
    </div>
    <div class="hint" id="go-hints"></div>
  </div>`;
}

function updateGoBtn() {
  const btn = document.getElementById("go-btn");
  const hints = document.getElementById("go-hints");
  const hasCarrier = S.files.some(f => f.role === 'carrier');
  const ok = S.clientName.trim() && hasCarrier && !!S.apiKey;
  if (btn) btn.disabled = !ok;
  if (hints) {
    let h = "";
    if (!S.apiKey) h += "🔑 Set your API key (top right). ";
    if (!hasCarrier) h += "📄 Upload at least one Carrier Quote PDF. ";
    if (!S.clientName.trim()) h += "✏️ Enter the client group name.";
    hints.textContent = h;
  }
}

function onTemplateFile(e) {
  const f = e.target.files[0];
  if (f) { S.templateFile = f; render(); updateGoBtn(); }
}

function onPDFFiles(e) {
  const newFiles = Array.from(e.target.files).map(file => ({
    file, role: detectRole(file.name), pageRange: '', pageCount: null,
    status: 'idle', data: null, error: null
  }));
  S.files = [...S.files, ...newFiles];
  render();
  updateGoBtn();
  // Load page counts
  newFiles.forEach((f, i) => {
    const idx = S.files.indexOf(f);
    loadPageCount(f.file).then(c => {
      S.files[idx].pageCount = c;
      // Soft re-render only if on pages step
      if (S.step === 1) render();
    });
  });
}

function detectRole(filename) {
  const lower = filename.toLowerCase();
  if (lower.includes('renewal') || lower.includes('current')) return 'renewal';
  return 'carrier';
}

function setFileRole(i, role) {
  S.files[i].role = role;
  // Only allow one renewal at a time
  if (role === 'renewal') {
    S.files.forEach((f, j) => { if (j !== i && f.role === 'renewal') f.role = 'carrier'; });
  }
  render();
  updateGoBtn();
}

function removeFile(i) {
  S.files = S.files.filter((_, j) => j !== i);
  render();
  updateGoBtn();
}

async function loadPageCount(file) {
  if (!window.pdfjsLib) {
    await loadPdfJs();
  }
  try {
    const ab = await fileToArrayBuffer(file);
    const pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
    return pdf.numPages;
  } catch (e) {
    return null;
  }
}

let pdfjsLoading = null;
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  if (pdfjsLoading) return pdfjsLoading;
  pdfjsLoading = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      res();
    };
    s.onerror = rej;
    document.head.appendChild(s);
  });
  return pdfjsLoading;
}

function goToPages() {
  if (!S.apiKey) return set({ error: "Please set your API key (top right)." });
  if (!S.clientName.trim()) return set({ error: "Please enter the client group name." });
  if (!S.files.some(f => f.role === 'carrier')) return set({ error: "Please upload at least one Carrier Quote PDF." });
  set({ step: 1, error: '' });
  loadPdfJs();
}

// ─── STEP 1: PAGE SELECTION ──────────────────────────────────────────────────
function viewPages() {
  const rows = S.files.map((f, i) => `
    <div class="page-card">
      <div class="page-card-icon ${f.role === 'renewal' ? 'renewal' : ''}">${f.role === 'renewal' ? '🔄' : '📄'}</div>
      <div class="page-card-info">
        <div class="page-card-name">${escHtml(f.file.name)}</div>
        <div class="page-card-meta">

      </div>

      </div>

    </div>
  </div>

    <button class="btn btn-primary" onclick="startExtraction()">Extract Plan Data →</button>
  </div>`;
}

// ─── STEP 2: EXTRACTION ──────────────────────────────────────────────────────
function viewExtract() {
  return `
  <div class="card">
    <div class="card-title"><span class="card-title-emoji">⚙️</span> Analyzing Documents</div>
    <p class="hint" style="margin-bottom:1rem;font-size:13px;color:var(--gray-600)">
      Extracting plans for <strong>${escHtml(S.clientName)}</strong>...
    </p>
    ${S.files.map(f => `
      <div class="progress-row">
        <div class="progress-dot ${f.status}"></div>
        <div style="flex:1">
          <div class="progress-name">
            ${escHtml(f.file.name)}
            <span class="page-card-tag ${f.role === 'renewal' ? 'renewal' : 'carrier'}" style="margin-left:6px">${f.role === 'renewal' ? 'Renewal' : 'Carrier'}</span>
          </div>
          ${f.status === 'active' ? '<div class="progress-sub active">Sending to Claude API...</div>' : ''}
          ${f.status === 'done' && f.role === 'carrier' ? `<div class="progress-sub done">✓ ${escHtml(f.data?.carrier || '')} – ${(f.data?.plans || []).length} plan${(f.data?.plans || []).length !== 1 ? 's' : ''}</div>` : ''}
          ${f.status === 'done' && f.role === 'renewal' ? `<div class="progress-sub done">✓ Renewal rates extracted</div>` : ''}
          ${f.status === 'idle' ? '<div class="progress-sub" style="color:var(--gray-400)">Waiting...</div>' : ''}
          ${f.status === 'error' ? `<div class="progress-sub error">${escHtml(f.error)}</div>` : ''}
        </div>
        ${f.status === 'done' ? '<span style="color:var(--green);font-size:16px">✓</span>' : ''}
      </div>
    `).join('')}
  </div>`;
}

async function startExtraction() {
  // Reset statuses
  S.files.forEach(f => { f.status = 'idle'; f.data = null; f.error = null; });
  set({ step: 2, error: '', warn: '' });

  const CARRIER_SCHEMA = '{"carrier":"string","plans":[{"plan_name":"","network":"","ded_ind":"","ded_fam":"","coinsurance":"","moop_ind":"","moop_fam":"","pcp":"","telehealth":"","specialist":"","inpatient":"","op_facility":"","er":"","urgent_care":"","lab":"","xray":"","imaging":"","oon_ded":"","oon_moop":"","oon_coins":"","rx_ded":"","rx_generic":"","rx_preferred":"","rx_nonpref":"","rx_specialty":"","rate_ee":0,"rate_es":0,"rate_ec":0,"rate_fam":0,"notes":""}]}';
  const RENEWAL_SCHEMA = '{"carrier":"","plan_name":"","rate_ee":0,"rate_es":0,"rate_ec":0,"rate_fam":0}';

  // Process all files in parallel
  const carriers = [];
  let renewalData = null;

  for (let i = 0; i < S.files.length; i++) {
    const f = S.files[i];
    f.status = 'active';
    render();

    try {
      const b64 = await fileToBase64(f.file);
      const isRenewal = f.role === 'renewal';
      const schema = isRenewal ? RENEWAL_SCHEMA : CARRIER_SCHEMA;
      const prompt = isRenewal
        ? `Extract the current renewal rates from this insurance contract PDF. Return ONLY this JSON: ${schema}`
        : `Extract all medical plans from this carrier quote PDF. Be concise. Return JSON matching this schema exactly: ${schema}`;

      const body = {
        _apiKey: S.apiKey,
        model: "claude-sonnet-4-20250514",
        max_tokens: isRenewal ? 500 : 16000,
        system: "Extract medical insurance data from carrier PDFs. Return ONLY valid compact JSON, no markdown, no code fences.",
        messages: [{
          role: "user",
          content: [
            { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
            { type: "text", text: prompt }
          ]
        }]
      };
      if (f.pageRange && f.pageRange.trim() && f.pageRange.trim().toLowerCase() !== 'all') {
        body._pageRange = f.pageRange;
      }

      const resp = await fetch("/api/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: { message: resp.statusText } }));
        throw new Error(err.error?.message || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const text = data.content?.find(b => b.type === "text")?.text || "{}";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());

      f.data = parsed;
      f.status = 'done';

      if (isRenewal) renewalData = parsed;
      else carriers.push(parsed);
    } catch (e) {
      f.status = 'error';
      f.error = e.message;
    }
    render();
  }

  S.carriers = carriers;
  S.renewalData = renewalData;
  // Pre-select all plans
  S.selectedPlanIds = new Set();
  carriers.forEach((c, ci) => (c.plans || []).forEach((_, pi) => S.selectedPlanIds.add(`${ci}-${pi}`)));

  const totalPlans = carriers.reduce((sum, c) => sum + (c.plans || []).length, 0);
  if (!totalPlans) {
    set({ error: "No plans were extracted. Try adjusting the page selection.", step: 0 });
    return;
  }

  setTimeout(() => set({ step: 3 }), 600);
}

// ─── STEP 3: SELECT PLANS ─────────────────────────────────────────────────────
function getAllPlans() {
  return S.carriers.flatMap((c, ci) =>
    (c.plans || []).map((p, pi) => ({
      id: `${ci}-${pi}`,
      ci, pi,
      carrier: c.carrier || 'Unknown',
      plan: p
    }))
  );
}

function calcSavings(planRate, renewalRate) {
  if (!planRate || !renewalRate) return null;
  const plan = Number(planRate);
  const ren = Number(renewalRate);
  if (!plan || !ren) return null;
  return ((ren - plan) / ren) * 100;
}

function viewSelect() {
  const plans = getAllPlans();
  const rd = S.renewalData;

  // Compute cheapest per carrier
  const cheapestByCarrier = {};
  plans.forEach(p => {
    const r = Number(p.plan.rate_ee) || 0;
    if (!r) return;
    if (!cheapestByCarrier[p.carrier] || r < cheapestByCarrier[p.carrier].rate) {
      cheapestByCarrier[p.carrier] = { id: p.id, rate: r };
    }
  });

  // Filter
  let filtered = plans.slice();
  if (S.filter === 'cheapest') {
    filtered = filtered.filter(p => cheapestByCarrier[p.carrier]?.id === p.id);
  } else if (S.filter === 'competitive' && rd) {
    filtered = filtered.filter(p => {
      const sav = calcSavings(p.plan.rate_ee, rd.rate_ee);
      return sav !== null && sav >= 5;
    });
  }

  // Sort
  filtered.sort((a, b) => {
    if (S.sort === 'rate') {
      return (Number(a.plan.rate_ee) || 999999) - (Number(b.plan.rate_ee) || 999999);
    }
    if (S.sort === 'savings' && rd) {
      const sa = calcSavings(a.plan.rate_ee, rd.rate_ee) ?? -999;
      const sb = calcSavings(b.plan.rate_ee, rd.rate_ee) ?? -999;
      return sb - sa;
    }
    // Default: carrier alphabetical
    if (a.carrier !== b.carrier) return a.carrier.localeCompare(b.carrier);
    return (Number(a.plan.rate_ee) || 0) - (Number(b.plan.rate_ee) || 0);
  });

  const selectedCount = S.selectedPlanIds.size;

  // Renewal info card
  let renewalCard = '';
  if (rd && rd.rate_ee) {
    renewalCard = `
    <div class="card" style="margin-bottom:1rem;border-left:3px solid var(--accent)">
      <div class="card-title"><span class="card-title-emoji">🔄</span> Current Renewal — Comparison Baseline</div>
      <div class="rate-comp">
        <div class="rate-stat">
          <div class="rate-stat-label">EE Only</div>
          <div class="rate-stat-value">$${Number(rd.rate_ee).toFixed(2)}</div>
        </div>
        <div class="rate-stat">
          <div class="rate-stat-label">EE + Spouse</div>
          <div class="rate-stat-value">$${rd.rate_es ? Number(rd.rate_es).toFixed(2) : '—'}</div>
        </div>
        <div class="rate-stat">
          <div class="rate-stat-label">EE + Child</div>
          <div class="rate-stat-value">$${rd.rate_ec ? Number(rd.rate_ec).toFixed(2) : '—'}</div>
        </div>
        <div class="rate-stat">
          <div class="rate-stat-label">Family</div>
          <div class="rate-stat-value">$${rd.rate_fam ? Number(rd.rate_fam).toFixed(2) : '—'}</div>
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="card" style="margin-bottom:1rem">
    <div class="row">
      <div>
        <div style="font-weight:600;font-size:16px;color:var(--gray-900)">${escHtml(S.clientName)}</div>
        <div class="hint" style="margin-top:2px">${plans.length} plan${plans.length !== 1 ? 's' : ''} extracted from ${S.carriers.length} carrier${S.carriers.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-ghost" onclick="set({step:0,carriers:[],renewalData:null,selectedPlanIds:new Set()})">← Start Over</button>
      <button class="btn btn-accent" onclick="generateExcel()" ${selectedCount === 0 ? 'disabled' : ''}>Generate Excel ↓</button>
    </div>
  </div>

  ${renewalCard}

  <div class="card">
    <div class="selection-summary">
      <span class="selection-count">${selectedCount} plan${selectedCount !== 1 ? 's' : ''} selected</span>
      <span class="selection-hint">Choose which plans to include in the final Excel comparison</span>
      <button class="btn btn-ghost" style="height:30px;font-size:12px;padding:0 12px" onclick="selectAll()">Select All</button>
      <button class="btn btn-ghost" style="height:30px;font-size:12px;padding:0 12px" onclick="clearSelection()">Clear</button>
    </div>

    <div class="filter-bar">
      <span style="font-size:11px;color:var(--gray-500);font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Filter:</span>
      <button class="filter-chip ${S.filter === 'all' ? 'on' : ''}" onclick="set({filter:'all'})">All Plans (${plans.length})</button>
      <button class="filter-chip ${S.filter === 'cheapest' ? 'on' : ''}" onclick="set({filter:'cheapest'})">⭐ Cheapest per Carrier</button>
      ${rd ? `<button class="filter-chip ${S.filter === 'competitive' ? 'on' : ''}" onclick="set({filter:'competitive'})">💰 Competitive (≥5% savings)</button>` : ''}
      <span class="spacer"></span>
      <span style="font-size:11px;color:var(--gray-500);font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Sort:</span>
      <select class="sort-select" onchange="set({sort:this.value})">
        <option value="carrier" ${S.sort === 'carrier' ? 'selected' : ''}>Carrier A-Z</option>
        <option value="rate" ${S.sort === 'rate' ? 'selected' : ''}>Lowest EE Rate</option>
        ${rd ? `<option value="savings" ${S.sort === 'savings' ? 'selected' : ''}>Highest Savings</option>` : ''}
      </select>
    </div>

    <div class="table-wrap">
      <table class="stbl">
        <thead>
          <tr>
            <th class="col-check"></th>
            <th>Carrier</th>
            <th>Plan</th>
            <th>Deductible</th>
            <th class="col-rate">EE Rate</th>
            ${rd ? '<th class="col-savings">EE Savings</th>' : ''}
            <th class="col-rate">Family Rate</th>
            ${rd ? '<th class="col-savings">Family Savings</th>' : ''}
          </tr>
        </thead>
        <tbody>
          ${filtered.map(p => {
            const selected = S.selectedPlanIds.has(p.id);
            const isCheapest = cheapestByCarrier[p.carrier]?.id === p.id;
            const eeSavings = calcSavings(p.plan.rate_ee, rd?.rate_ee);
            const famSavings = calcSavings(p.plan.rate_fam, rd?.rate_fam);
            return `
            <tr class="${selected ? 'selected' : ''} ${isCheapest ? 'cheapest-in-carrier' : ''}" onclick="togglePlan('${p.id}')">
              <td class="col-check"><input type="checkbox" ${selected ? 'checked' : ''} onclick="event.stopPropagation();togglePlan('${p.id}')"></td>
              <td class="col-carrier">${escHtml(p.carrier)}</td>
              <td class="col-plan">${escHtml(p.plan.plan_name || '—')}</td>
              <td class="col-deductible">${escHtml(p.plan.ded_ind || '—')}${p.plan.ded_fam ? ' / ' + escHtml(p.plan.ded_fam) : ''}</td>
              <td class="col-rate">${p.plan.rate_ee ? '$' + Number(p.plan.rate_ee).toFixed(2) : '—'}</td>
              ${rd ? renderSavings(eeSavings) : ''}
              <td class="col-rate">${p.plan.rate_fam ? '$' + Number(p.plan.rate_fam).toFixed(2) : '—'}</td>
              ${rd ? renderSavings(famSavings) : ''}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ${filtered.length === 0 ? '<div style="text-align:center;padding:2rem;color:var(--gray-500);font-size:13px">No plans match this filter</div>' : ''}
  </div>

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
    <button class="btn btn-ghost" onclick="set({step:0,carriers:[],renewalData:null,selectedPlanIds:new Set()})">← Start Over</button>
    <button class="btn btn-accent" onclick="generateExcel()" ${selectedCount === 0 ? 'disabled' : ''}>Generate Excel ↓ (${selectedCount} selected)</button>
  </div>`;
}

function renderSavings(pct) {
  if (pct === null) return '<td class="col-savings"><span class="savings-na">—</span></td>';
  let cls = 'savings-neg';
  if (pct >= 5) cls = 'savings-pos';
  else if (pct >= 0) cls = 'savings-mild';
  const sign = pct >= 0 ? '+' : '';
  return `<td class="col-savings"><span class="${cls}">${sign}${pct.toFixed(1)}%</span></td>`;
}

function togglePlan(id) {
  if (S.selectedPlanIds.has(id)) S.selectedPlanIds.delete(id);
  else S.selectedPlanIds.add(id);
  render();
}

function selectAll() {
  getAllPlans().forEach(p => S.selectedPlanIds.add(p.id));
  render();
}
function clearSelection() {
  S.selectedPlanIds.clear();
  render();
}

// ─── STEP 4: COMPLETE ─────────────────────────────────────────────────────────
function viewComplete() {
  const fname = `${(S.clientName || "Group").replace(/\s+/g, "_")}_Medical_Comparison.xlsx`;
  const selected = Array.from(S.selectedPlanIds);

  return `
  <div class="card complete">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">Excel ready</div>
    <div class="complete-sub">
      <strong>${escHtml(fname)}</strong> has been downloaded with ${selected.length} plan${selected.length !== 1 ? 's' : ''}.<br>
      ${S.renewalData ? 'Renewal comparison rows are included below the rate section.' : ''}
    </div>
    <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="generateExcel()">Download Again ↓</button>
      <button class="btn" onclick="set({step:3})">← Adjust Selection</button>
      <button class="btn btn-ghost" onclick="resetApp()">Start New Group</button>
    </div>
  </div>`;
}

async function generateExcel() {
  if (!S.templateFile) return set({ error: "No template file uploaded." });
  if (S.selectedPlanIds.size === 0) return set({ error: "Select at least one plan." });

  try {
    const templateB64 = await fileToBase64(S.templateFile);
    // Build the selectedPlans array in display order (carrier → plan within carrier)
    const allPlans = getAllPlans();
    const selected = allPlans
      .filter(p => S.selectedPlanIds.has(p.id))
      .map(p => ({ carrier: p.carrier, plan: p.plan }));

    const resp = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        template: templateB64,
        selectedPlans: selected,
        clientName: S.clientName,
        renewalData: S.renewalData
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: { message: resp.statusText } }));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${(S.clientName || "Group").replace(/\s+/g, "_")}_Medical_Comparison.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
    set({ step: 4, error: '' });
  } catch (e) {
    set({ error: "Excel generation failed: " + e.message });
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function resetApp() {
  Object.assign(S, {
    step: 0, templateFile: null, files: [], clientName: "",
    carriers: [], renewalData: null, selectedPlanIds: new Set(),
    filter: "all", sort: "carrier", error: "", warn: "", info: ""
  });
  render();
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function fileToArrayBuffer(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}
function escHtml(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function attachDropEvents() {
  ["dz-tmpl", "dz-pdfs"].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("over"); });
    el.addEventListener("dragleave", () => el.classList.remove("over"));
    el.addEventListener("drop", e => {
      e.preventDefault();
      el.classList.remove("over");
      const files = Array.from(e.dataTransfer.files);
      if (id === "dz-tmpl") {
        const f = files.find(f => f.name.match(/\.xlsx?$/i));
        if (f) { S.templateFile = f; render(); updateGoBtn(); }
      } else {
        const pdfs = files.filter(f => f.name.match(/\.pdf$/i));
        if (pdfs.length) {
          const newFiles = pdfs.map(file => ({
            file, role: detectRole(file.name), pageRange: '', pageCount: null,
            status: 'idle', data: null, error: null
          }));
          S.files = [...S.files, ...newFiles];
          render();
          updateGoBtn();
          newFiles.forEach((f) => {
            const idx = S.files.indexOf(f);
            loadPageCount(f.file).then(c => { S.files[idx].pageCount = c; if (S.step === 1) render(); });
          });
        }
      }
    });
  });
}

render();
setTimeout(updateGoBtn, 50);
</script>
</body>
</html>
