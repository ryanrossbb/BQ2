<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Benefits Comparison</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --primary:#0d2a4f;
    --primary-light:#1e4076;
    --primary-pale:#eef3fa;
    --accent:#c9a84c;
    --accent-light:#e8c97a;
    --green:#0f7a3e;
    --green-bg:#e6f7ee;
    --red:#b91c1c;
    --red-bg:#fee2e2;
    --amber-bg:#fef9c3;
    --amber:#854d0e;
    --gray-50:#f9fafb;
    --gray-100:#f3f4f6;
    --gray-200:#e5e7eb;
    --gray-300:#d1d5db;
    --gray-400:#9ca3af;
    --gray-500:#6b7280;
    --gray-600:#4b5563;
    --gray-700:#374151;
    --gray-900:#111827;
    --radius:10px;
    --radius-sm:6px;
    --shadow:0 1px 3px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
    --shadow-lg:0 4px 16px rgba(13,42,79,0.08);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f4f8;color:var(--gray-900);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* TOP BAR */
  .topbar{background:var(--primary);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-lg)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--primary)}
  .brand-title{color:white;font-size:15px;font-weight:600;letter-spacing:-0.01em}
  .brand-sub{color:rgba(255,255,255,0.6);font-size:12px;margin-left:8px;font-weight:400}
  .key-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);color:white;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background 0.15s}
  .key-btn:hover{background:rgba(255,255,255,0.18)}
  .key-dot{width:7px;height:7px;border-radius:50%;background:#22c55e}
  .key-dot.missing{background:#f87171}

  /* MAIN */
  .main{max-width:1200px;margin:0 auto;padding:1.75rem 1.25rem 4rem}

  /* STEPS */
  .steps{display:flex;align-items:center;background:white;border-radius:var(--radius);padding:1rem 1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem}
  .step{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
  .step-circle{width:30px;height:30px;border-radius:50%;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
  .step-circle.done{background:var(--green-bg);color:var(--green)}
  .step-circle.active{background:var(--primary);color:white;box-shadow:0 0 0 3px rgba(13,42,79,0.12)}
  .step-circle.idle{background:var(--gray-100);color:var(--gray-400);border:1px solid var(--gray-200)}
  .step-text{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  .step-text.active{color:var(--gray-900);font-weight:600}
  .step-text.done{color:var(--green)}
  .step-text.idle{color:var(--gray-400)}
  .step-line{flex:0 0 28px;height:1px;background:var(--gray-200);margin:0 6px}

  /* CARDS */
  .card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem 1.5rem;border:1px solid var(--gray-200)}
  .card+.card{margin-top:1rem}
  .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--gray-500);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .card-title-emoji{font-size:14px}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

  /* DROP ZONE */
  .drop-zone{border:2px dashed var(--gray-300);border-radius:var(--radius);padding:1.75rem 1rem;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--gray-50)}
  .drop-zone:hover,.drop-zone.over{border-color:var(--primary-light);background:var(--primary-pale)}
  .drop-zone.filled{border-style:solid;border-color:var(--green);background:var(--green-bg)}
  .drop-icon{font-size:28px;margin-bottom:6px}
  .drop-title{font-size:14px;font-weight:500;color:var(--gray-700)}
  .drop-sub{font-size:12px;color:var(--gray-500);margin-top:3px}

  /* FILE LIST */
  .file-row{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:6px;transition:border-color 0.15s}
  .file-row:hover{border-color:var(--gray-300)}
  .file-row.renewal{background:#fff8e1;border-color:#fde68a}
  .file-icon{font-size:18px;flex-shrink:0}
  .file-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--gray-700)}
  .file-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;cursor:pointer;border:1px solid;transition:all 0.15s}
  .file-tag.carrier{background:var(--primary-pale);color:var(--primary);border-color:var(--primary-light)}
  .file-tag.renewal{background:#fef3c7;color:#854d0e;border-color:#fcd34d}
  .file-tag-select{padding:5px 10px;border-radius:var(--radius-sm);background:white;border:1px solid var(--gray-300);font-size:11px;font-weight:500;color:var(--gray-700);cursor:pointer;outline:none}
  .file-tag-select:focus{border-color:var(--primary-light)}
  .file-remove{cursor:pointer;color:var(--gray-400);font-size:18px;line-height:1;padding:2px 6px;border-radius:4px;transition:all 0.1s}
  .file-remove:hover{color:var(--red);background:var(--red-bg)}

  /* FORM ELEMENTS */
  .field{margin-bottom:0.75rem}
  .field-label{font-size:12px;font-weight:500;color:var(--gray-700);display:block;margin-bottom:5px}
  input[type=text],input[type=password]{width:100%;height:38px;padding:0 12px;font-size:13px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);color:var(--gray-900);background:white;transition:border-color 0.12s,box-shadow 0.12s}
  input[type=text]:focus,input[type=password]:focus{outline:none;border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(30,64,118,0.1)}

  /* BUTTONS */
  .btn{height:38px;padding:0 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--gray-300);background:white;color:var(--gray-700);transition:all 0.12s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .btn:hover:not(:disabled){background:var(--gray-50);border-color:var(--gray-400)}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:0.4;cursor:not-allowed}
  .btn-primary{background:var(--primary);color:white;border-color:var(--primary)}
  .btn-primary:hover:not(:disabled){background:var(--primary-light);border-color:var(--primary-light)}
  .btn-accent{background:var(--accent);color:var(--primary);border-color:var(--accent);font-weight:600}
  .btn-accent:hover:not(:disabled){background:var(--accent-light);border-color:var(--accent-light)}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--gray-600)}
  .btn-ghost:hover:not(:disabled){background:var(--gray-100)}

  /* ALERTS */
  .alert{border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
  .alert-error{background:var(--red-bg);color:var(--red);border:1px solid #fca5a5}
  .alert-warn{background:var(--amber-bg);color:var(--amber);border:1px solid #fde047}
  .alert-info{background:var(--primary-pale);color:var(--primary);border:1px solid #bfdbfe}

  /* PROGRESS */
  .progress-row{display:flex;align-items:center;gap:11px;padding:12px 16px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:8px}
  .progress-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .progress-dot.idle{background:var(--gray-300)}
  .progress-dot.active{background:#3b82f6;animation:pulse 1s infinite}
  .progress-dot.done{background:#22c55e}
  .progress-dot.error{background:#ef4444}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .progress-name{flex:1;font-size:13px;font-weight:500}
  .progress-sub{font-size:11px;margin-top:2px}
  .progress-sub.done{color:var(--green)}
  .progress-sub.active{color:var(--primary-light)}
  .progress-sub.error{color:var(--red)}

  /* SELECTION TABLE */
  .selection-summary{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--primary-pale);border:1px solid #bfdbfe;border-radius:var(--radius-sm);margin-bottom:1rem}
  .selection-count{font-size:13px;font-weight:600;color:var(--primary)}
  .selection-hint{font-size:12px;color:var(--gray-500);flex:1}
  .table-wrap{overflow-x:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:white}
  .stbl{border-collapse:collapse;width:100%;font-size:12.5px}
  .stbl th,.stbl td{border-bottom:1px solid var(--gray-100);padding:9px 12px;vertical-align:middle}
  .stbl thead th{background:var(--gray-50);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);text-align:left;border-bottom:2px solid var(--gray-200);position:sticky;top:0;z-index:1}
  .stbl tbody tr{transition:background 0.1s}
  .stbl tbody tr:hover{background:var(--gray-50)}
  .stbl tbody tr.selected{background:var(--primary-pale)}
  .stbl tbody tr.selected:hover{background:#dbeafe}
  .stbl tbody tr.cheapest-in-carrier{position:relative}
  .stbl tbody tr.cheapest-in-carrier td:first-child::before{content:"⭐";position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:10px}
  .stbl tbody tr.cheapest-in-carrier td:nth-child(2){padding-left:24px}
  .col-check{width:36px;text-align:center}
  .col-check input{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}
  .col-carrier{font-weight:600;color:var(--primary);min-width:130px;max-width:180px}
  .col-plan{min-width:160px;max-width:240px;color:var(--gray-700)}
  .col-rate{font-family:"SF Mono",Menlo,monospace;text-align:right;font-size:12px;color:var(--gray-700);min-width:90px}
  .col-savings{text-align:right;min-width:100px}
  .savings-pos{color:var(--green);font-weight:600;font-size:12px}
  .savings-mild{color:#ca8a04;font-weight:500;font-size:12px}
  .savings-neg{color:var(--red);font-weight:500;font-size:12px}
  .savings-na{color:var(--gray-300);font-size:12px}
  .col-deductible{color:var(--gray-600);font-size:12px;min-width:110px}
  .filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap}
  .filter-chip{padding:5px 12px;border:1px solid var(--gray-300);border-radius:14px;font-size:11px;background:white;cursor:pointer;color:var(--gray-600);transition:all 0.1s}
  .filter-chip:hover{border-color:var(--gray-400)}
  .filter-chip.on{background:var(--primary);border-color:var(--primary);color:white}
  .sort-select{height:30px;padding:0 28px 0 10px;font-size:12px;border:1px solid var(--gray-300);border-radius:14px;background:white;cursor:pointer;color:var(--gray-700)}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(13,42,79,0.5);z-index:100;display:none;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:white;border-radius:var(--radius);padding:1.75rem;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--gray-900)}
  .modal-sub{font-size:13px;color:var(--gray-600);margin-bottom:1.25rem;line-height:1.55}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem}

  /* COMPLETE */
  .complete{text-align:center;padding:3rem 2rem}
  .complete-icon{font-size:52px;margin-bottom:1rem}
  .complete-title{font-size:22px;font-weight:600;margin-bottom:8px;color:var(--gray-900)}
  .complete-sub{font-size:14px;color:var(--gray-600);margin-bottom:1.75rem;line-height:1.6}

  /* PAGE SELECT */
  .page-card{padding:14px 18px;background:white;border-radius:var(--radius-sm);border:1px solid var(--gray-200);margin-bottom:10px}
  .page-card-header{display:flex;align-items:center;gap:14px;margin-bottom:10px}
  .page-card-icon{font-size:22px;flex-shrink:0;width:36px;height:36px;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .page-card-icon.renewal{background:#fef3c7}
  .page-card-info{flex:1;min-width:0}
  .page-card-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .page-card-meta{font-size:11px;color:var(--gray-500);margin-top:2px;display:flex;gap:6px;align-items:center}
  .page-card-tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
  .page-card-tag.carrier{background:var(--primary-pale);color:var(--primary)}
  .page-card-tag.renewal{background:#fef3c7;color:#854d0e}
  .page-card input[type=text]{height:32px;font-size:12px;width:200px}
  .page-card-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .page-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .page-action-btn{font-size:10px;padding:3px 8px;border:1px solid var(--gray-300);border-radius:12px;background:white;cursor:pointer;color:var(--gray-600);transition:all 0.1s;font-family:inherit}
  .page-action-btn:hover{border-color:var(--primary-light);color:var(--primary)}
  .page-action-divider{width:1px;height:14px;background:var(--gray-300);margin:0 3px}
  .thumbs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-top:10px}
  .thumb{position:relative;cursor:pointer;background:white;border:2px solid var(--gray-200);border-radius:var(--radius-sm);overflow:hidden;transition:all 0.12s}
  .thumb:hover{border-color:var(--primary-light);transform:translateY(-1px)}
  .thumb.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(13,42,79,0.12)}
  .thumb.selected::after{content:"✓";position:absolute;top:6px;right:6px;width:22px;height:22px;background:var(--primary);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;z-index:2}
  .thumb canvas{width:100%;display:block;background:#fff}
  .thumb-loading{display:flex;align-items:center;justify-content:center;height:170px;color:var(--gray-300);font-size:11px;background:var(--gray-50)}
  .thumb-label{padding:6px 8px;font-size:11px;font-weight:500;color:var(--gray-700);text-align:center;border-top:1px solid var(--gray-100);background:var(--gray-50)}
  .thumb.selected .thumb-label{background:var(--primary-pale);color:var(--primary);font-weight:600}

  /* RATE COMPARISON CARD */
  .rate-comp{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1rem}
  .rate-stat{background:var(--gray-50);border-radius:var(--radius-sm);padding:12px;text-align:center;border:1px solid var(--gray-200)}
  .rate-stat-label{font-size:10px;color:var(--gray-500);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
  .rate-stat-value{font-size:15px;font-weight:600;color:var(--gray-900);font-family:"SF Mono",Menlo,monospace}
  .rate-stat-value.positive{color:var(--green)}
  .rate-stat-value.negative{color:var(--red)}

  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .spacer{flex:1}
  .hint{font-size:11px;color:var(--gray-500);margin-top:8px;line-height:1.5}

  @media(max-width:780px){
    .grid-2{grid-template-columns:1fr}
    .step-text{display:none}
    .rate-comp{grid-template-columns:repeat(2,1fr)}
  }

  /* Dashboard */
  .dash-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
  .dash-title{font-size:22px;font-weight:600;color:var(--gray-900)}
  .dash-sub{font-size:13px;color:var(--gray-500)}
  .group-card{background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.25rem 1.5rem;border:1px solid var(--gray-200);margin-bottom:0.75rem;display:flex;align-items:center;gap:14px}
  .group-card-info{flex:1;min-width:0}
  .group-card-name{font-size:15px;font-weight:600;color:var(--gray-900);margin-bottom:4px}
  .group-card-meta{font-size:12px;color:var(--gray-500)}
  .group-card-actions{display:flex;gap:6px}
  .group-card-status{display:inline-flex;align-items:center;padding:3px 9px;font-size:10px;font-weight:600;border-radius:11px;text-transform:uppercase;letter-spacing:.05em;margin-left:8px}
  .group-card-status.draft{background:var(--amber-bg);color:var(--amber)}
  .group-card-status.ready{background:var(--green-bg);color:var(--green)}
  .empty-state{background:white;border-radius:var(--radius);padding:3rem;text-align:center;border:2px dashed var(--gray-300)}
  .empty-icon{font-size:42px;margin-bottom:1rem}
  .empty-title{font-size:16px;font-weight:500;margin-bottom:6px;color:var(--gray-700)}
  .empty-sub{font-size:13px;color:var(--gray-500);margin-bottom:1.25rem;line-height:1.5}

  /* Preview spreadsheet */
  .preview-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding:10px 14px;background:var(--primary-pale);border-radius:var(--radius-sm);border:1px solid #bfdbfe}
  .preview-info{font-size:12px;color:var(--primary)}
  .preview-table-wrap{overflow-x:auto;border:1px solid var(--gray-200);border-radius:var(--radius-sm);background:white;max-height:75vh}
  .ptbl{border-collapse:separate;border-spacing:0;width:100%;font-size:12px}
  .ptbl th,.ptbl td{border-right:1px solid var(--gray-200);border-bottom:1px solid var(--gray-200);padding:0;vertical-align:middle}
  .ptbl th:last-child,.ptbl td:last-child{border-right:none}
  .ptbl thead th{background:var(--gray-50);font-weight:600;color:var(--gray-700);position:sticky;top:0;z-index:2;border-bottom:2px solid var(--gray-300)}
  .ptbl thead .carrier-row th{background:var(--primary);color:white;font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:8px 12px}
  .ptbl thead .plan-row th{background:var(--primary-light);color:white;font-size:12px;padding:7px 12px}
  .ptbl thead .renewal-header{background:var(--accent)!important;color:var(--primary)!important}
  .ptbl tbody td{padding:6px 10px;color:var(--gray-700)}
  .ptbl tbody td.label-cell{position:sticky;left:0;background:var(--gray-50);font-weight:500;color:var(--gray-600);min-width:170px;max-width:220px;border-right:2px solid var(--gray-300);z-index:1}
  .ptbl tbody tr:hover td.label-cell{background:#eef3fa}
  .ptbl .section-header td{background:var(--primary-pale);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--primary);padding:6px 12px}
  .ptbl .section-header td.label-cell{background:var(--primary-pale)}
  .ptbl .renewal-col{background:#fffbeb}
  .ptbl tbody tr:hover .renewal-col{background:#fef3c7}
  .editable-cell{cursor:text;outline:none;min-width:100px;display:block;padding:6px 10px;margin:-6px -10px;border-radius:0}
  .editable-cell:hover{background:rgba(13,42,79,0.04)}
  .editable-cell:focus{background:#fff;box-shadow:inset 0 0 0 2px var(--primary-light);position:relative;z-index:3}
  .savings-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:1rem}
  .savings-stat{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:12px;text-align:center}
  .savings-stat-label{font-size:10px;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:4px}
  .savings-stat-value{font-size:16px;font-weight:600;font-family:"SF Mono",Menlo,monospace}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">📋</div>
    <span class="brand-title">Medical Benefits Comparison</span>
    <span class="brand-sub">Carrier Quote Toolkit</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center" id="topbar-actions"></div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-bg" id="login-modal">
  <div class="modal">
    <div class="modal-title">🔒 Sign In</div>
    <div class="modal-sub">Enter the access password to use this tool.</div>
    <label class="field-label">Password</label>
    <input type="password" id="login-input" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="login-error" style="color:var(--red);font-size:12px;margin-top:6px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%">Sign In</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="alerts"></div>
  <div class="steps" id="steps"></div>
  <div id="view"></div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const S = {
  authed: false,
  view: 'dashboard', // 'dashboard' | 'group' | 'templates'
  step: 0,
  files: [],
  clientName: "",
  quoteType: "single",  // "single" | "double" | "triple"
  carriers: [],
  renewalData: null,
  // For Single: selectedPlanIds is a Set of "ci-pi"
  // For Double/Triple: bundleSelections is { carrierIdx: [planIdx, planIdx, ...] }
  selectedPlanIds: new Set(),
  bundleSelections: {},  // { ci: [pi, pi, ...] } where length must match bundleSize
  filter: "all",
  sort: "carrier",
  // Multi-group session
  groups: [], // [{id, clientName, carriers, renewalData, selectedPlanIds: [...], templateFileB64, templateFileName}]
  editingGroupId: null,
  // Preview adjustments per group
  previewEdits: {}, // {groupId: {planIdx: {fieldKey: value}}}
  error: "",
  warn: "",
  info: "",
};

function set(patch) { Object.assign(S, patch); render(); }

// Centralized fetch wrapper that handles session expiry
window._origFetch = window._origFetch || window.fetch.bind(window);
window.fetch = async function(...args) {
  const resp = await window._origFetch(...args);
  // Only redirect to login if 401 came from our API
  const url = typeof args[0] === 'string' ? args[0] : (args[0]?.url || '');
  if (resp.status === 401 && url.includes('/api/') && !url.includes('/api/auth/')) {
    if (S.authed) {
      S.authed = false;
      set({ error: 'Session expired. Please sign in again.' });
    }
  }
  return resp;
};

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const STEPS = ["Upload", "Pages", "Extract", "Select Plans", "Preview", "Generate"];

// ─── KEY MODAL ───────────────────────────────────────────────────────────────
async function checkAuth() {
  try {
    const r = await fetch('/api/auth/check');
    const d = await r.json();
    S.authed = !!d.authed;
  } catch(e) { S.authed = false; }
  render();
}

function showLogin() {
  document.getElementById('login-modal').classList.add('open');
  setTimeout(() => document.getElementById('login-input').focus(), 50);
}

async function doLogin() {
  const pw = document.getElementById('login-input').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  try {
    const r = await fetch('/api/auth/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({password: pw})
    });
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      errEl.textContent = d.error?.message || 'Sign in failed';
      errEl.style.display = 'block';
      return;
    }
    document.getElementById('login-modal').classList.remove('open');
    document.getElementById('login-input').value = '';
    S.authed = true;
    render();
  } catch(e) {
    errEl.textContent = 'Network error';
    errEl.style.display = 'block';
  }
}

async function doLogout() {
  await fetch('/api/auth/logout', {method:'POST'});
  S.authed = false;
  render();
}

function updateTopbar() {
  const el = document.getElementById('topbar-actions');
  if (!el) return;
  if (S.authed) {
    el.innerHTML = '<button class="key-btn" onclick="doLogout()">Sign Out</button>';
  } else {
    el.innerHTML = '';
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  updateTopbar();

  if (!S.authed) {
    document.getElementById('alerts').innerHTML = '';
    document.getElementById('steps').innerHTML = '';
    document.getElementById('view').innerHTML = '';
    showLogin();
    return;
  }

  // Alerts
  const a = document.getElementById("alerts");
  let html = "";
  if (S.error) html += `<div class="alert alert-error">⚠️ ${S.error}</div>`;
  if (S.warn) html += `<div class="alert alert-warn">ℹ️ ${S.warn}</div>`;
  if (S.info) html += `<div class="alert alert-info">📋 ${S.info}</div>`;
  a.innerHTML = html;

  const stepsEl = document.getElementById('steps');
  const viewEl = document.getElementById('view');

  if (S.view === 'dashboard') {
    stepsEl.style.display = 'none';
    viewEl.innerHTML = viewDashboard();
  } else if (S.view === 'templates') {
    stepsEl.style.display = 'none';
    viewEl.innerHTML = viewTemplates();
    setTimeout(loadTemplateList, 0);
  } else {
    stepsEl.style.display = 'flex';
    stepsEl.innerHTML = STEPS.map((s, i) => {
      const st = i < S.step ? "done" : i === S.step ? "active" : "idle";
      return `<div class="step">
        <div class="step-circle ${st}">${st === "done" ? "✓" : i + 1}</div>
        <span class="step-text ${st}">${s}</span>
      </div>${i < STEPS.length - 1 ? '<div class="step-line"></div>' : ''}`;
    }).join("");

    if (S.step === 0) viewEl.innerHTML = viewUpload();
    else if (S.step === 1) viewEl.innerHTML = viewPages();
    else if (S.step === 2) viewEl.innerHTML = viewExtract();
    else if (S.step === 3) viewEl.innerHTML = viewSelect();
    else if (S.step === 4) viewEl.innerHTML = viewPreview();
    else if (S.step === 5) viewEl.innerHTML = viewComplete();
  }

  attachDropEvents();
}

// ─── TEMPLATE LIBRARY MANAGEMENT ─────────────────────────────────────────────
let _templateList = [];

async function loadTemplateList() {
  try {
    const r = await fetch('/api/templates');
    if (!r.ok) throw new Error('Failed to load');
    const data = await r.json();
    _templateList = data.templates || [];
    renderTemplateRows();
  } catch (e) {
    const el = document.getElementById('templates-body');
    if (el) el.innerHTML = '<div class="alert alert-error">Failed to load: ' + escHtml(e.message) + '</div>';
  }
}

function renderTemplateRows() {
  const el = document.getElementById('templates-body');
  if (!el) return;
  const labels = { single: 'Single Plan', double: 'Double Plan', triple: 'Triple Plan' };
  const icons  = { single: '1️⃣', double: '2️⃣', triple: '3️⃣' };
  el.innerHTML = _templateList.map(t => {
    const status = t.available
      ? `<span style="color:var(--green);font-weight:600;font-size:12px">✓ Loaded</span>`
      : `<span style="color:var(--red);font-weight:600;font-size:12px">⚠ Not uploaded</span>`;
    const meta = t.available && t.modifiedAt
      ? `<div style="font-size:11px;color:var(--gray-500);margin-top:2px">Updated ${new Date(t.modifiedAt * 1000).toLocaleDateString()} · ${(t.sizeBytes/1024).toFixed(1)} KB</div>`
      : '';
    return `
    <div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:white;border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:8px">
      <div style="font-size:24px;width:42px;height:42px;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center">${icons[t.type]||'📊'}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:14px">${labels[t.type]||t.type} Template</div>
        <div style="font-size:12px;color:var(--gray-500);margin-top:2px">${status}</div>
        ${meta}
      </div>
      <input type="file" id="tpl-input-${t.type}" accept=".xlsx,.xls" style="display:none" onchange="uploadTemplate('${t.type}', this.files[0])">
      <button class="btn btn-ghost" onclick="document.getElementById('tpl-input-${t.type}').click()">${t.available?'Replace':'Upload'}</button>
      ${t.available ? `<a href="/api/templates/${t.type}/download" class="btn btn-ghost" download>Download</a>` : ''}
      ${t.available ? `<button class="btn btn-ghost" onclick="deleteTemplate('${t.type}')" style="color:var(--red)">Remove</button>` : ''}
    </div>`;
  }).join('');
}

async function uploadTemplate(type, file) {
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const r = await fetch(`/api/templates/${type}`, {method: 'POST', body: fd});
    if (!r.ok) {
      const d = await r.json().catch(()=>({}));
      throw new Error(d.error?.message || 'Upload failed');
    }
    set({info: `${type} template uploaded.`});
    loadTemplateList();
  } catch (e) {
    set({error: 'Upload failed: ' + e.message});
  }
}

async function deleteTemplate(type) {
  if (!confirm(`Remove the ${type} template?`)) return;
  try {
    const r = await fetch(`/api/templates/${type}`, {method: 'DELETE'});
    if (!r.ok) throw new Error('Delete failed');
    loadTemplateList();
  } catch (e) {
    set({error: 'Delete failed: ' + e.message});
  }
}

function viewTemplates() {
  return `
  <div class="dash-header">
    <div style="flex:1">
      <div class="dash-title">📋 Manage Templates</div>
      <div class="dash-sub">Upload your branded Excel templates. The app picks the right one based on plan count.</div>
    </div>
    <button class="btn btn-ghost" onclick="set({view:'dashboard'})">← Dashboard</button>
  </div>

  <div class="card" style="margin-bottom:1rem">
    <div class="card-title"><span class="card-title-emoji">💡</span> How it works</div>
    <div style="font-size:13px;color:var(--gray-600);line-height:1.6">
      Upload one .xlsx template per quote type. The Single template is used for one-plan-per-carrier comparisons. The Double template is for two-plan bundles. The Triple template is for three-plan bundles.
      <br><br>
      <strong>How they're used:</strong> Each group is tagged as Single, Double, or Triple in the upload step. The matching template is used to generate the Excel. Templates must have "Plan 1" / "Plan 2" placeholders and a row with carrier names that the app can find.
    </div>
  </div>

  <div id="templates-body">
    <div class="hint" style="text-align:center;padding:2rem">Loading templates...</div>
  </div>`;
}

// ─── DASHBOARD: MULTI-GROUP HOME ─────────────────────────────────────────────
function viewDashboard() {
  const groups = S.groups;
  const readyCount = groups.filter(g => g.ready).length;

  return `
  <div class="dash-header">
    <div style="flex:1">
      <div class="dash-title">Your Quote Comparisons</div>
      <div class="dash-sub">${groups.length === 0 ? 'Add your first group to get started.' : `${groups.length} group${groups.length!==1?'s':''} in this session · ${readyCount} ready to export`}</div>
    </div>
    <button class="btn btn-ghost" onclick="set({view:'templates'})" title="Manage Excel templates">📋 Manage Templates</button>
    <button class="btn btn-primary" onclick="startNewGroup()">+ Add Group</button>
    ${readyCount > 0 ? `<button class="btn btn-accent" onclick="exportAllGroups()">Export All (${readyCount}) ↓</button>` : ''}
  </div>

  ${groups.length === 0 ? `
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No groups yet</div>
      <div class="empty-sub">A group is one client with their carrier quotes and renewal contract.<br>Add as many as you need — each becomes its own Excel.</div>
      <button class="btn btn-primary" onclick="startNewGroup()">+ Add Your First Group</button>
    </div>
  ` : groups.map(g => `
    <div class="group-card">
      <div style="font-size:24px">${g.ready ? '✅' : '📝'}</div>
      <div class="group-card-info">
        <div class="group-card-name">${escHtml(g.clientName)}<span class="group-card-status ${g.ready?'ready':'draft'}">${g.ready?'Ready':'Draft'}</span></div>
        <div class="group-card-meta">
          <span style="display:inline-block;padding:1px 8px;background:var(--primary-pale);color:var(--primary);border-radius:10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-right:6px">${g.quoteType||'single'}</span>
          ${g.carriers ? `${g.carriers.length} carrier${g.carriers.length!==1?'s':''} · ` : ''}
          ${g.selectedCount || 0} plan${(g.selectedCount||0)!==1?'s':''} selected
          ${g.renewalData ? ' · 🔄 Renewal' : ''}
        </div>
      </div>
      <div class="group-card-actions">
        <button class="btn btn-ghost" onclick="editGroup('${g.id}')">Edit</button>
        ${g.ready ? `<button class="btn btn-primary" onclick="exportGroup('${g.id}')">Download ↓</button>` : ''}
        <button class="btn btn-ghost" onclick="deleteGroup('${g.id}')" style="color:var(--red)">Remove</button>
      </div>
    </div>
  `).join('')}`;
}

function startNewGroup() {
  // Reset working state, enter group flow
  Object.assign(S, {
    view: 'group',
    step: 0,
    files: [],
    clientName: '',
    quoteType: 'single',
    bundleSelections: {},
    carriers: [],
    renewalData: null,
    selectedPlanIds: new Set(),
    filter: 'all',
    sort: 'carrier',
    editingGroupId: null,
    error: '',
    warn: '',
    info: ''
  });
  render();
  setTimeout(updateGoBtn, 50);
}

function editGroup(id) {
  const g = S.groups.find(x => x.id === id);
  if (!g) return;
  Object.assign(S, {
    view: 'group',
    step: 3,
    clientName: g.clientName,
    quoteType: g.quoteType || 'single',
    bundleSelections: JSON.parse(JSON.stringify(g.bundleSelections || {})),
    carriers: g.carriers || [],
    renewalData: g.renewalData,
    selectedPlanIds: new Set(g.selectedPlanIdsList || []),
    editingGroupId: id,
    files: [],
    filter: 'all',
    sort: 'carrier',
    error: '',
    warn: '',
    info: ''
  });
  render();
}

function deleteGroup(id) {
  if (!confirm('Remove this group?')) return;
  S.groups = S.groups.filter(g => g.id !== id);
  delete S.previewEdits[id];
  render();
}

async function exportGroup(id) {
  const g = S.groups.find(x => x.id === id);
  if (!g) { set({ error: 'Group not found' }); return; }
  await downloadExcelForGroup(g);
}

async function exportAllGroups() {
  const ready = S.groups.filter(g => g.ready);
  for (const g of ready) {
    await downloadExcelForGroup(g);
    await new Promise(r => setTimeout(r, 800));
  }
}

async function downloadExcelForGroup(g) {
  try {
    const editsForGroup = S.previewEdits[g.id] || {};

    // Build bundles grouped by carrier, in carrier-display order
    const bundles = [];
    const bs = ({single:1,double:2,triple:3})[g.quoteType||'single'] || 1;

    if (bs === 1) {
      // Single: each selected plan becomes its own bundle of size 1
      const idSet = new Set(g.selectedPlanIdsList || []);
      (g.carriers || []).forEach((c, ci) => {
        (c.plans || []).forEach((p, pi) => {
          const id = `${ci}-${pi}`;
          if (idSet.has(id)) {
            const edits = editsForGroup[id] || {};
            bundles.push({
              carrier: edits._carrier || c.carrier || 'Unknown',
              plans: [{ ...p, ...edits }]
            });
          }
        });
      });
    } else {
      // Double/Triple: each carrier with selections becomes one bundle
      const sel = g.bundleSelections || {};
      Object.keys(sel).map(Number).sort((a,b)=>a-b).forEach(ci => {
        const c = g.carriers[ci];
        if (!c) return;
        const planIdxs = sel[ci] || [];
        const plansInBundle = planIdxs.map(pi => {
          const id = `${ci}-${pi}`;
          const edits = editsForGroup[id] || {};
          return { ...c.plans[pi], ...edits };
        });
        bundles.push({ carrier: c.carrier || 'Unknown', plans: plansInBundle });
      });
    }

    // Renewal: wrap as a bundle
    let renewalBundle = null;
    if (g.renewalData) {
      const r = g.renewalData;
      const renewalPlans = [r];
      // For Double/Triple, we don't have multiple renewal plans, so pad with empty
      while (renewalPlans.length < bs) renewalPlans.push({});
      renewalBundle = {
        carrier: r.carrier || 'Current Renewal',
        plans: renewalPlans
      };
    }

    const resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        quoteType: g.quoteType || 'single',
        selectedBundles: bundles,
        renewalBundle: renewalBundle,
        clientName: g.clientName,
        census: g.census || null
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${g.clientName.replace(/\s+/g,'_')}_Medical_Comparison.xlsx`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    set({ error: 'Excel generation failed: ' + e.message });
  }
}

// ─── STEP 0: UPLOAD ──────────────────────────────────────────────────────────
function viewUpload() {
  const hasFiles = S.files.length > 0;
  const hasRenewal = S.files.some(f => f.role === 'renewal');
  const hasCarrier = S.files.some(f => f.role === 'carrier');

  return `
  <div class="card" style="margin-bottom:1rem">
    <div class="card-title"><span class="card-title-emoji">📄</span> Quote Documents</div>
    <div class="drop-zone ${hasFiles ? 'filled' : ''}" id="dz-pdfs" onclick="document.getElementById('fi-pdfs').click()">
      <input type="file" id="fi-pdfs" accept=".pdf" multiple style="display:none" onchange="onPDFFiles(event)">
      <div class="drop-icon">📥</div>
      <div class="drop-title">${hasFiles ? 'Add more documents' : 'Drop PDFs here'}</div>
      <div class="drop-sub">All PDFs together — tag the renewal vs carrier quotes below</div>
    </div>
  </div>

  ${hasFiles ? `
  <div class="card" style="margin-bottom:1rem">
    <div class="card-title"><span class="card-title-emoji">🏷️</span> Tag each document</div>
    ${!hasRenewal ? '<div class="alert alert-warn" style="margin-bottom:10px">⚠️ Tag one document as <strong>Renewal</strong> to enable savings comparisons.</div>' : ''}
    ${S.files.map((f, i) => `
      <div class="file-row ${f.role === 'renewal' ? 'renewal' : ''}">
        <div class="file-icon">${f.role === 'renewal' ? '🔄' : '📄'}</div>
        <div class="file-name">${escHtml(f.file.name)}</div>
        <select class="file-tag-select" onchange="setFileRole(${i},this.value)">
          <option value="carrier" ${f.role === 'carrier' ? 'selected' : ''}>📄 Carrier Quote</option>
          <option value="renewal" ${f.role === 'renewal' ? 'selected' : ''}>🔄 Current Renewal</option>
        </select>
        <div class="file-remove" onclick="removeFile(${i})" title="Remove">×</div>
      </div>
    `).join('')}
    <div class="hint">Most groups have one renewal document and 1-5 carrier quote documents.</div>
  </div>
  ` : ''}

  <div class="card">
    <div class="card-title"><span class="card-title-emoji">👤</span> Group Details</div>
    <div style="margin-bottom:14px">
      <label class="field-label">Quote Type</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${[
          {v:'single', icon:'1️⃣', label:'Single Plan',  desc:'One plan per carrier'},
          {v:'double', icon:'2️⃣', label:'Double Plan',  desc:'Two plans bundled per carrier'},
          {v:'triple', icon:'3️⃣', label:'Triple Plan',  desc:'Three plans bundled per carrier'},
        ].map(qt => `
          <label style="flex:1;min-width:170px;display:flex;gap:8px;align-items:flex-start;padding:11px 14px;background:${S.quoteType===qt.v?'var(--primary-pale)':'var(--gray-50)'};border:1.5px solid ${S.quoteType===qt.v?'var(--primary)':'var(--gray-200)'};border-radius:var(--radius-sm);cursor:pointer;transition:all 0.12s">
            <input type="radio" name="qt" value="${qt.v}" ${S.quoteType===qt.v?'checked':''} onchange="S.quoteType='${qt.v}';render()" style="margin-top:2px;cursor:pointer;accent-color:var(--primary)">
            <div>
              <div style="font-weight:500;font-size:13px;color:var(--gray-900)">${qt.icon} ${qt.label}</div>
              <div style="font-size:11px;color:var(--gray-500);margin-top:2px">${qt.desc}</div>
            </div>
          </label>
        `).join('')}
      </div>
    </div>
    <div style="display:flex;gap:1rem;align-items:flex-end">
      <div style="flex:1">
        <label class="field-label">Client Group Name</label>
        <input type="text" id="client-name" placeholder="e.g. Liberty Restoration Group" value="${escHtml(S.clientName)}" oninput="S.clientName=this.value;updateGoBtn()">
      </div>
      <button class="btn btn-ghost" onclick="set({view:'dashboard'})">← Dashboard</button>
      <button class="btn btn-primary" id="go-btn" onclick="goToPages()">Continue →</button>
    </div>
    <div class="hint" id="go-hints"></div>
  </div>`;
}

function updateGoBtn() {
  const btn = document.getElementById("go-btn");
  const hints = document.getElementById("go-hints");
  const hasCarrier = S.files.some(f => f.role === 'carrier');
  const ok = S.clientName.trim() && hasCarrier;
  if (btn) btn.disabled = !ok;
  if (hints) {
    let h = "";
    if (!hasCarrier) h += "📄 Upload at least one Carrier Quote PDF. ";
    if (!S.clientName.trim()) h += "✏️ Enter the client group name.";
    hints.textContent = h;
  }
}

function onPDFFiles(e) {
  const newFiles = Array.from(e.target.files).map(file => ({
    file, role: detectRole(file.name), pageRange: '', pageCount: null,
    status: 'idle', data: null, error: null
  }));
  S.files = [...S.files, ...newFiles];
  render();
  updateGoBtn();
  // Load page counts
  newFiles.forEach((f, i) => {
    const idx = S.files.indexOf(f);
    loadPageCount(f.file).then(c => {
      S.files[idx].pageCount = c;
      // Soft re-render only if on pages step
      if (S.step === 1) render();
    });
  });
}

function detectRole(filename) {
  const lower = filename.toLowerCase();
  if (lower.includes('renewal') || lower.includes('current')) return 'renewal';
  return 'carrier';
}

function setFileRole(i, role) {
  S.files[i].role = role;
  // Only allow one renewal at a time
  if (role === 'renewal') {
    S.files.forEach((f, j) => { if (j !== i && f.role === 'renewal') f.role = 'carrier'; });
  }
  render();
  updateGoBtn();
}

function removeFile(i) {
  S.files = S.files.filter((_, j) => j !== i);
  render();
  updateGoBtn();
}

async function loadPageCount(file) {
  if (!window.pdfjsLib) {
    await loadPdfJs();
  }
  try {
    const ab = await fileToArrayBuffer(file);
    const pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
    return pdf.numPages;
  } catch (e) {
    return null;
  }
}

let pdfjsLoading = null;
function loadPdfJs() {
  if (window.pdfjsLib) return Promise.resolve();
  if (pdfjsLoading) return pdfjsLoading;
  pdfjsLoading = new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      res();
    };
    s.onerror = rej;
    document.head.appendChild(s);
  });
  return pdfjsLoading;
}

// Convert text page range to set of page numbers
function parsePageRange(rangeStr, total) {
  const result = new Set();
  if (!rangeStr || !rangeStr.trim() || rangeStr.trim().toLowerCase() === 'all') return result;
  rangeStr.split(',').forEach(part => {
    part = part.trim();
    if (part.includes('-')) {
      const [s, e] = part.split('-').map(x => parseInt(x.trim(), 10));
      if (!isNaN(s) && !isNaN(e)) {
        for (let p = Math.max(1, s); p <= Math.min(total, e); p++) result.add(p);
      }
    } else {
      const n = parseInt(part, 10);
      if (!isNaN(n) && n >= 1 && n <= total) result.add(n);
    }
  });
  return result;
}

// Convert set back to compact range string (e.g. "1-3, 5, 7-9")
function pagesToRange(pages, total) {
  if (pages.size === 0 || pages.size === total) return '';
  const sorted = [...pages].sort((a, b) => a - b);
  const ranges = [];
  let start = sorted[0], prev = sorted[0];
  for (let i = 1; i <= sorted.length; i++) {
    if (i === sorted.length || sorted[i] !== prev + 1) {
      ranges.push(start === prev ? String(start) : `${start}-${prev}`);
      if (i < sorted.length) start = sorted[i];
    }
    prev = sorted[i];
  }
  return ranges.join(', ');
}

function togglePage(fileIdx, pageNum) {
  const f = S.files[fileIdx];
  const total = f.pageCount || 0;
  let pages = parsePageRange(f.pageRange, total);
  // Treat empty as "all pages selected"
  if (pages.size === 0) {
    pages = new Set(Array.from({length: total}, (_, i) => i + 1));
  }
  if (pages.has(pageNum)) pages.delete(pageNum);
  else pages.add(pageNum);
  S.files[fileIdx].pageRange = pagesToRange(pages, total);
  // Update just the thumb visual + summary, not full re-render
  const thumb = document.querySelector(`#thumbs-${fileIdx} .thumb:nth-child(${pageNum})`);
  if (thumb) thumb.classList.toggle('selected', pages.has(pageNum));
  updatePageSummary(fileIdx);
  // Update the text input
  const inputs = document.querySelectorAll(`.page-card input[type=text]`);
  if (inputs[fileIdx]) inputs[fileIdx].value = S.files[fileIdx].pageRange;
}

function updatePageSummary(fileIdx) {
  const f = S.files[fileIdx];
  const total = f.pageCount || 0;
  const selected = parsePageRange(f.pageRange, total);
  const cards = document.querySelectorAll('.page-card');
  if (!cards[fileIdx]) return;
  const meta = cards[fileIdx].querySelector('.page-card-meta');
  if (!meta) return;
  const summarySpan = meta.querySelector('span:last-child');
  if (!summarySpan || !summarySpan.style.color) return;
  const summaryText = selected.size === 0 ? 'All pages will be sent' :
                      selected.size === total ? 'All pages will be sent' :
                      `${selected.size} of ${total} page${total !== 1 ? 's' : ''} selected`;
  summarySpan.textContent = `· ${summaryText}`;
}

function selectAllPages(fileIdx) {
  S.files[fileIdx].pageRange = '';
  render();
}

function clearPages(fileIdx) {
  // Selecting "no pages" means we set range to one impossible page so nothing's selected visually
  // but keep at least page 1 to avoid sending nothing
  S.files[fileIdx].pageRange = '1';
  render();
}

function selectFirstPages(fileIdx, count) {
  const total = S.files[fileIdx].pageCount || 0;
  if (!total) return;
  S.files[fileIdx].pageRange = `1-${Math.min(count, total)}`;
  render();
}

async function renderAllThumbnails() {
  await loadPdfJs();
  for (let i = 0; i < S.files.length; i++) {
    const f = S.files[i];
    if (!f.pageCount) continue;
    if (!f._pdfDoc) {
      try {
        const ab = await fileToArrayBuffer(f.file);
        f._pdfDoc = await window.pdfjsLib.getDocument({ data: ab }).promise;
      } catch (e) {
        console.warn('PDF load failed', e);
        continue;
      }
    }
    for (let p = 1; p <= f.pageCount; p++) {
      const canvas = document.getElementById(`thumb-${i}-${p}`);
      const loadingEl = document.getElementById(`thumbloading-${i}-${p}`);
      if (!canvas || canvas.dataset.rendered) continue;
      try {
        const page = await f._pdfDoc.getPage(p);
        const baseViewport = page.getViewport({ scale: 1 });
        const targetWidth = 180;  // medium thumbnail width
        const scale = targetWidth / baseViewport.width;
        const viewport = page.getViewport({ scale });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        canvas.dataset.rendered = 'true';
        if (loadingEl) loadingEl.style.display = 'none';
      } catch (e) {
        console.warn(`Page ${p} render failed`, e);
      }
    }
  }
}

async function startExtraction() {
  // Reset statuses
  S.files.forEach(f => { f.status = 'idle'; f.data = null; f.error = null; });
  set({ step: 2, error: '', warn: '' });

  const CARRIER_SCHEMA = '{"carrier":"string","plans":[{"plan_name":"","network":"","ded_ind":"","ded_fam":"","coinsurance":"","moop_ind":"","moop_fam":"","pcp":"","telehealth":"","specialist":"","inpatient":"","op_facility":"","er":"","urgent_care":"","lab":"","xray":"","imaging":"","oon_ded":"","oon_moop":"","oon_coins":"","rx_ded":"","rx_generic":"","rx_preferred":"","rx_nonpref":"","rx_specialty":"","rate_ee":0,"rate_es":0,"rate_ec":0,"rate_fam":0,"notes":""}]}';
  const RENEWAL_SCHEMA = CARRIER_SCHEMA;  // extract full benefits for renewal too

  // Process all files in parallel
  const carriers = [];
  let renewalData = null;

  for (let i = 0; i < S.files.length; i++) {
    const f = S.files[i];
    f.status = 'active';
    render();

    try {
      const b64 = await fileToBase64(f.file);
      const isRenewal = f.role === 'renewal';
      const schema = isRenewal ? RENEWAL_SCHEMA : CARRIER_SCHEMA;
      const prompt = isRenewal
        ? `This is a current health insurance renewal document. Find the SINGLE renewal/proposed plan (NOT alternative plans being offered). Extract ALL benefit details and rates from the renewal plan section.

CRITICAL: This PDF may show one renewal plan PLUS many alternatives in a multi-plan exhibit table. ONLY extract the renewal/proposed plan, ignore the alternatives.

For the renewal plan, extract:
- carrier name (e.g. "ACEC Life/Health Trust", "UnitedHealthcare")
- plan_name (the plan code/name like "EHI6 PROformance")
- network info
- Deductible (in-network individual / family)
- MOOP (out-of-pocket max in-network individual / family)
- Coinsurance percentage
- Office copays (PCP, Specialist, Urgent Care, ER, Inpatient)
- Pharmacy/Rx tier copays (Generic, Preferred Brand, Non-Preferred, Specialty)
- All four rate tiers (Employee Only, Employee + Spouse, Employee + Child(ren), Family)
- Out-of-network deductible, coinsurance, MOOP

Return JSON in plans array with ONE plan object. Schema: ${schema}`
        : `Extract EVERY medical plan from this carrier quote PDF.

CRITICAL: For EVERY plan you extract, you MUST include all four rate fields with numeric values:
- rate_ee (Employee Only / EE Only / EE Total / Single)
- rate_es (Employee + Spouse / EE + Spouse / ES Total)
- rate_ec (Employee + Child(ren) / EE + Child / EC Total)
- rate_fam (Family / Employee + Family / EF Total / Full Family)

If rates are shown as PEPM or monthly amounts, use them as-is. Extract numeric value only (no $ or commas). NEVER skip rate fields - if a plan exists in the PDF, its rates exist too. Find them.

For benefit fields (deductible, copays, etc.), keep values brief (e.g. "$25" not "$25 copay per visit"). If a benefit field is not visible, use empty string "".

Return JSON matching this schema exactly: ${schema}`;

      const body = {
        model: "claude-sonnet-4-20250514",
        max_tokens: isRenewal ? 4000 : 32000,
        system: "Extract medical insurance data from carrier PDFs. Return ONLY valid compact JSON, no markdown, no code fences.",
        messages: [{
          role: "user",
          content: [
            { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
            { type: "text", text: prompt }
          ]
        }]
      };
      if (f.pageRange && f.pageRange.trim() && f.pageRange.trim().toLowerCase() !== 'all') {
        body._pageRange = f.pageRange;
      } else if (isRenewal && f.pageCount && f.pageCount > 2) {
        // Auto-limit renewal extraction to first 2 pages to avoid confusion from multi-plan exhibits
        body._pageRange = '1-2';
      }

      const resp = await fetch("/api/extract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (resp.status === 401) {
        // Session expired - send back to login and stop the loop
        S.authed = false;
        set({ error: 'Session expired. Please sign in again.', step: 0 });
        return;
      }
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: { message: resp.statusText } }));
        throw new Error(err.error?.message || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const text = data.content?.find(b => b.type === "text")?.text || "{}";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());

      f.data = parsed;
      f.status = 'done';

      if (isRenewal) {
        // renewal returns full carrier shape with plans[]; flatten to single plan + carrier name
        const rPlan = (parsed.plans && parsed.plans[0]) || {};
        renewalData = {
          carrier: parsed.carrier || 'Current Renewal',
          ...rPlan
        };
      }
      else carriers.push(parsed);
    } catch (e) {
      f.status = 'error';
      f.error = e.message;
    }
    render();
  }

  S.carriers = carriers;
  S.renewalData = renewalData;
  // Pre-select all plans
  S.selectedPlanIds = new Set();
  carriers.forEach((c, ci) => (c.plans || []).forEach((_, pi) => S.selectedPlanIds.add(`${ci}-${pi}`)));

  const totalPlans = carriers.reduce((sum, c) => sum + (c.plans || []).length, 0);
  if (!totalPlans) {
    // Surface the underlying error from any file that had problems
    const errorFiles = S.files.filter(f => f.status === 'error');
    let msg = "No plans were extracted.";
    if (errorFiles.length > 0) {
      msg += " Errors: " + errorFiles.map(f => `${f.file.name}: ${f.error}`).join('; ');
    } else {
      msg += " Try adjusting the page selection.";
    }
    set({ error: msg, step: 0 });
    return;
  }

  setTimeout(() => set({ step: 3 }), 600);
}

function getAllPlans() {
  return S.carriers.flatMap((c, ci) =>
    (c.plans || []).map((p, pi) => ({
      id: `${ci}-${pi}`,
      ci, pi,
      carrier: c.carrier || 'Unknown',
      plan: p
    }))
  );
}

function calcSavings(planRate, renewalRate) {
  if (!planRate || !renewalRate) return null;
  const plan = Number(planRate);
  const ren = Number(renewalRate);
  if (!plan || !ren) return null;
  return ((ren - plan) / ren) * 100;
}

function viewSelect() {

  const rd = S.renewalData;

  // Compute cheapest per carrier
  const cheapestByCarrier = {};
  plans.forEach(p => {
    const r = Number(p.plan.rate_ee) || 0;
    if (!r) return;
    if (!cheapestByCarrier[p.carrier] || r < cheapestByCarrier[p.carrier].rate) {
      cheapestByCarrier[p.carrier] = { id: p.id, rate: r };
    }
  });

  // Filter
  let filtered = plans.slice();
  if (S.filter === 'cheapest') {
    filtered = filtered.filter(p => cheapestByCarrier[p.carrier]?.id === p.id);
  } else if (S.filter === 'competitive' && rd) {
    filtered = filtered.filter(p => {
      const sav = calcSavings(p.plan.rate_ee, rd.rate_ee);
      return sav !== null && sav >= 5;

    if (S.sort === 'rate') {
      return (Number(a.plan.rate_ee) || 999999) - (Number(b.plan.rate_ee) || 999999);

    if (S.sort === 'savings' && rd) {
      const sa = calcSavings(a.plan.rate_ee, rd.rate_ee) ?? -999;
      const sb = calcSavings(b.plan.rate_ee, rd.rate_ee) ?? -999;
      return sb - sa;

      ${rd ? `<button class="filter-chip ${S.filter === 'competitive' ? 'on' : ''}" onclick="set({filter:'competitive'})">💰 Competitive (≥5% savings)</button>` : ''}
      <span class="spacer"></span>
      <span style="font-size:11px;color:var(--gray-500);font-weight:500;text-transform:uppercase;letter-spacing:0.05em">Sort:</span>
      <select class="sort-select" onchange="set({sort:this.value})">
        <option value="carrier" ${S.sort === 'carrier' ? 'selected' : ''}>Carrier A-Z</option>
        <option value="rate" ${S.sort === 'rate' ? 'selected' : ''}>Lowest EE Rate</option>
        ${rd ? `<option value="savings" ${S.sort === 'savings' ? 'selected' : ''}>Highest Savings</option>` : ''}
      </select>
    </div>

    <div class="table-wrap">
      <table class="stbl">
        <thead>
          <tr>
            <th class="col-check"></th>
            <th>Carrier</th>
            <th>Plan</th>
            <th>Deductible</th>
            <th class="col-rate">EE Rate</th>
            ${rd ? '<th class="col-savings">EE Savings</th>' : ''}
            <th class="col-rate">Family Rate</th>
            ${rd ? '<th class="col-savings">Family Savings</th>' : ''}
          </tr>
        </thead>
        <tbody>
          ${filtered.map(p => {
            const selected = S.selectedPlanIds.has(p.id);
            const isCheapest = cheapestByCarrier[p.carrier]?.id === p.id;
            const eeSavings = calcSavings(p.plan.rate_ee, rd?.rate_ee);
            const famSavings = calcSavings(p.plan.rate_fam, rd?.rate_fam);
            return `
            <tr class="${selected ? 'selected' : ''} ${isCheapest ? 'cheapest-in-carrier' : ''}" onclick="togglePlan('${p.id}')">
              <td class="col-check"><input type="checkbox" ${selected ? 'checked' : ''} onclick="event.stopPropagation();togglePlan('${p.id}')"></td>
              <td class="col-carrier">${escHtml(p.carrier)}</td>
              <td class="col-plan">${escHtml(p.plan.plan_name || '—')}</td>
              <td class="col-deductible">${escHtml(p.plan.ded_ind || '—')}${p.plan.ded_fam ? ' / ' + escHtml(p.plan.ded_fam) : ''}</td>
              <td class="col-rate">${p.plan.rate_ee ? '$' + Number(p.plan.rate_ee).toFixed(2) : '—'}</td>
              ${rd ? renderSavings(eeSavings) : ''}
              <td class="col-rate">${p.plan.rate_fam ? '$' + Number(p.plan.rate_fam).toFixed(2) : '—'}</td>
              ${rd ? renderSavings(famSavings) : ''}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ${filtered.length === 0 ? '<div style="text-align:center;padding:2rem;color:var(--gray-500);font-size:13px">No plans match this filter</div>' : ''}
  </div>

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
    <button class="btn btn-ghost" onclick="set({view:'dashboard'})">← Go Back</button>
    <button class="btn btn-accent" onclick="set({step:4})" ${!canContinue ? 'disabled' : ''}>Preview & Verify → (${selectedCount} selected)</button>
  </div>`;
}

function renderSavings(pct) {
  if (pct === null) return '<td class="col-savings"><span class="savings-na">—</span></td>';
  let cls = 'savings-neg';
  if (pct >= 5) cls = 'savings-pos';
  else if (pct >= 0) cls = 'savings-mild';
  const sign = pct >= 0 ? '+' : '';
  return `<td class="col-savings"><span class="${cls}">${sign}${pct.toFixed(1)}%</span></td>`;
}

function bundleSize() {
  return ({single:1, double:2, triple:3})[S.quoteType] || 1;
}

function togglePlan(id) {
  // For Single: simple toggle. For Double/Triple: enforce per-carrier bundle limit.
  const [ci, pi] = id.split('-').map(Number);
  const bs = bundleSize();
  if (bs === 1) {
    if (S.selectedPlanIds.has(id)) S.selectedPlanIds.delete(id);
    else S.selectedPlanIds.add(id);
  } else {
    if (!S.bundleSelections[ci]) S.bundleSelections[ci] = [];
    const sel = S.bundleSelections[ci];
    const idx = sel.indexOf(pi);
    if (idx >= 0) {
      sel.splice(idx, 1);
    } else {
      if (sel.length >= bs) {
        // Replace oldest pick
        sel.shift();
      }
      sel.push(pi);
    }
    if (sel.length === 0) delete S.bundleSelections[ci];
    // Also keep selectedPlanIds in sync for the preview/savings display
    S.selectedPlanIds = new Set();
    Object.entries(S.bundleSelections).forEach(([ci, pis]) => {
      pis.forEach(pi => S.selectedPlanIds.add(`${ci}-${pi}`));
    });
  }
  render();
}

function isPlanSelected(id) {
  const [ci, pi] = id.split('-').map(Number);
  if (bundleSize() === 1) return S.selectedPlanIds.has(id);
  return (S.bundleSelections[ci] || []).includes(pi);
}

function carrierBundleStatus(ci) {
  const bs = bundleSize();
  if (bs === 1) return null;
  const count = (S.bundleSelections[ci] || []).length;
  return { count, needed: bs, complete: count === bs };
}

function selectAll() {
  if (bundleSize() === 1) {
    getAllPlans().forEach(p => S.selectedPlanIds.add(p.id));
  } else {
    // Auto-pick first N plans per carrier
    const bs = bundleSize();
    S.carriers.forEach((c, ci) => {
      S.bundleSelections[ci] = (c.plans || []).slice(0, bs).map((_, pi) => pi);
    });
    S.selectedPlanIds = new Set();
    Object.entries(S.bundleSelections).forEach(([ci, pis]) => {
      pis.forEach(pi => S.selectedPlanIds.add(`${ci}-${pi}`));
    });
  }
  render();
}
function clearSelection() {
  S.selectedPlanIds.clear();
  S.bundleSelections = {};
  render();
}

// ─── STEP 4: PREVIEW (editable spreadsheet) ─────────────────────────────────
const PREVIEW_FIELDS = [
  { section: 'Plan Info', rows: [
    { key: 'plan_name',  label: 'Plan Name' },
    { key: 'network',    label: 'Network' },
  ]},
  { section: 'Medical Benefits', rows: [
    { key: 'ded_ind',    label: 'Deductible (Ind)' },
    { key: 'ded_fam',    label: 'Deductible (Fam)' },
    { key: 'coinsurance',label: 'Coinsurance' },
    { key: 'moop_ind',   label: 'MOOP (Ind)' },
    { key: 'moop_fam',   label: 'MOOP (Fam)' },
  ]},
  { section: 'Services & Copays', rows: [
    { key: 'pcp',        label: 'PCP Copay' },
    { key: 'telehealth', label: 'Telehealth' },
    { key: 'specialist', label: 'Specialist Copay' },
    { key: 'inpatient',  label: 'Inpatient' },
    { key: 'op_facility',label: 'Outpatient Facility' },
    { key: 'er',         label: 'ER' },
    { key: 'urgent_care',label: 'Urgent Care' },
    { key: 'lab',        label: 'Laboratory' },
    { key: 'xray',       label: 'X-Ray' },
    { key: 'imaging',    label: 'Imaging' },
  ]},
  { section: 'Out-of-Network', rows: [
    { key: 'oon_ded',    label: 'OON Deductible' },
    { key: 'oon_moop',   label: 'OON MOOP' },
    { key: 'oon_coins',  label: 'OON Coinsurance' },
  ]},
  { section: 'Prescription', rows: [
    { key: 'rx_ded',       label: 'Rx Deductible' },
    { key: 'rx_generic',   label: 'Generic' },
    { key: 'rx_preferred', label: 'Preferred Brand' },
    { key: 'rx_nonpref',   label: 'Non-Preferred' },
    { key: 'rx_specialty', label: 'Specialty' },
  ]},
  { section: 'Monthly Rates', rows: [
    { key: 'rate_ee',  label: 'Employee Only',     numeric: true },
    { key: 'rate_es',  label: 'Employee + Spouse', numeric: true },
    { key: 'rate_ec',  label: 'Employee + Child',  numeric: true },
    { key: 'rate_fam', label: 'Family',            numeric: true },
  ]},
  { section: 'Notes', rows: [
    { key: 'notes', label: 'Rate Guarantee / Notes' },
  ]},
];

function getPreviewPlans() {
  const all = (S.carriers || []).flatMap((c, ci) =>
    (c.plans || []).map((p, pi) => ({ id: `${ci}-${pi}`, ci, pi, carrier: c.carrier || 'Unknown', plan: p }))
  );
  return all.filter(p => S.selectedPlanIds.has(p.id));
}

function getPreviewValue(planId, fieldKey, fallback) {
  const groupKey = S.editingGroupId || 'current';
  const edits = (S.previewEdits[groupKey] || {})[planId] || {};
  if (fieldKey in edits) return edits[fieldKey];
  return fallback;
}

function setPreviewEdit(planId, fieldKey, value) {
  const groupKey = S.editingGroupId || 'current';
  if (!S.previewEdits[groupKey]) S.previewEdits[groupKey] = {};
  if (!S.previewEdits[groupKey][planId]) S.previewEdits[groupKey][planId] = {};
  S.previewEdits[groupKey][planId][fieldKey] = value;
}

function fmtRate(v) {
  if (v === '' || v === null || v === undefined) return '';
  const n = Number(v);
  if (isNaN(n)) return v;
  return '$' + n.toFixed(2);
}

function viewPreview() {
  const plans = getPreviewPlans();
  const rd = S.renewalData;

  if (plans.length === 0) {
    return `<div class="card"><div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">No plans selected</div>
      <button class="btn btn-primary" onclick="set({step:3})">← Back to Plan Selection</button>
    </div></div>`;
  }

  // Build all columns: renewal first if present
  const cols = [];
  if (rd) {
    cols.push({ id: 'renewal', isRenewal: true, carrier: rd.carrier || 'Current Renewal', plan: rd });
  }
  plans.forEach(p => cols.push({ id: p.id, ci: p.ci, pi: p.pi, carrier: p.carrier, plan: p.plan }));

  // Carrier header row with merged cells (in HTML using colspan)
  const carrierGroups = [];
  cols.forEach(c => {
    const last = carrierGroups[carrierGroups.length - 1];
    if (last && last.carrier === c.carrier && last.isRenewal === !!c.isRenewal) {
      last.span += 1;
      last.cols.push(c);
    } else {
      carrierGroups.push({ carrier: c.carrier, isRenewal: !!c.isRenewal, span: 1, cols: [c] });
    }
  });

  const carrierHeaderHtml = carrierGroups.map(g => {
    if (g.isRenewal) {
      return `<th colspan="${g.span}" class="renewal-header">
        <span class="editable-cell" contenteditable spellcheck="false" onblur="S.renewalData.carrier=this.innerText.trim()">${escHtml(g.carrier)}</span>
      </th>`;
    }
    return `<th colspan="${g.span}">${escHtml(g.carrier)}</th>`;
  }).join('');

  const planHeaderHtml = cols.map(c => {
    const planName = c.isRenewal
      ? (S.renewalEditedPlanName ?? rd.plan_name ?? '')
      : (c.plan.plan_name || '—');
    if (c.isRenewal) {
      return `<th class="renewal-header">
        <span class="editable-cell" contenteditable spellcheck="false" onblur="S.renewalEditedPlanName=this.innerText.trim();S.renewalData.plan_name=S.renewalEditedPlanName">${escHtml(planName)}</span>
      </th>`;
    }
    return `<th>
      <span class="editable-cell" contenteditable spellcheck="false" onblur="setPreviewEdit('${c.id}','plan_name',this.innerText)">${escHtml(planName)}</span>
    </th>`;
  }).join('');

  // Body
  let body = '';
  PREVIEW_FIELDS.forEach(section => {
    body += `<tr class="section-header"><td class="label-cell" colspan="${cols.length + 1}">${section.section}</td></tr>`;
    section.rows.forEach(field => {
      let row = `<tr><td class="label-cell">${field.label}</td>`;
      cols.forEach(c => {
        const baseVal = c.plan[field.key] ?? '';
        const val = c.isRenewal ? baseVal : getPreviewValue(c.id, field.key, baseVal);
        const display = field.numeric ? fmtRate(val) : (val || '');
        const cellCls = c.isRenewal ? 'renewal-col' : '';
        if (c.isRenewal) {
          row += `<td class="${cellCls}">${escHtml(String(display))}</td>`;
        } else {
          row += `<td class="${cellCls}"><span class="editable-cell" contenteditable spellcheck="false" onblur="onPreviewEdit(event,'${c.id}','${field.key}',${field.numeric?'true':'false'})">${escHtml(String(display))}</span></td>`;
        }
      });
      row += '</tr>';
      body += row;
    });
  });

  // Savings summary
  let savingsHtml = '';
  if (rd && rd.rate_ee) {
    const renEE = Number(rd.rate_ee) || 0;
    const renFam = Number(rd.rate_fam) || 0;
    const planEEs = plans.map(p => Number(getPreviewValue(p.id, 'rate_ee', p.plan.rate_ee)) || 0).filter(v => v > 0);
    const planFams = plans.map(p => Number(getPreviewValue(p.id, 'rate_fam', p.plan.rate_fam)) || 0).filter(v => v > 0);
    const avgEE = planEEs.length ? planEEs.reduce((a,b)=>a+b,0)/planEEs.length : 0;
    const avgFam = planFams.length ? planFams.reduce((a,b)=>a+b,0)/planFams.length : 0;
    const bestEE = planEEs.length ? Math.min(...planEEs) : 0;
    const bestFam = planFams.length ? Math.min(...planFams) : 0;
    const eeSavings = renEE && bestEE ? ((renEE - bestEE) / renEE * 100).toFixed(1) : '—';
    const famSavings = renFam && bestFam ? ((renFam - bestFam) / renFam * 100).toFixed(1) : '—';

    savingsHtml = `
    <div class="savings-summary">
      <div class="savings-stat">
        <div class="savings-stat-label">Best EE Rate</div>
        <div class="savings-stat-value" style="color:var(--green)">${bestEE?fmtRate(bestEE):'—'}</div>
        <div style="font-size:11px;color:var(--gray-500);margin-top:3px">vs renewal ${fmtRate(renEE)}</div>
      </div>
      <div class="savings-stat">
        <div class="savings-stat-label">Best EE Savings</div>
        <div class="savings-stat-value" style="color:var(--green)">${eeSavings === '—' ? '—' : (eeSavings>=0?'+':'')+eeSavings+'%'}</div>
      </div>
      <div class="savings-stat">
        <div class="savings-stat-label">Best Family Rate</div>
        <div class="savings-stat-value" style="color:var(--green)">${bestFam?fmtRate(bestFam):'—'}</div>
        <div style="font-size:11px;color:var(--gray-500);margin-top:3px">vs renewal ${fmtRate(renFam)}</div>
      </div>
      <div class="savings-stat">
        <div class="savings-stat-label">Best Family Savings</div>
        <div class="savings-stat-value" style="color:var(--green)">${famSavings === '—' ? '—' : (famSavings>=0?'+':'')+famSavings+'%'}</div>
      </div>
    </div>`;
  }

  return `
  <div class="card" style="margin-bottom:1rem">
    <div class="row">
      <div>
        <div style="font-weight:600;font-size:16px;color:var(--gray-900)">${escHtml(S.clientName)} — Preview</div>
        <div class="hint" style="margin-top:2px">Click any cell to edit. Verify the math before generating Excel.</div>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-ghost" onclick="set({step:3})">← Back</button>
      <button class="btn btn-primary" onclick="saveGroupAndContinue()">Looks Good — Continue →</button>
    </div>
  </div>

  <div class="preview-toolbar">
    <span class="preview-info">📋 ${cols.length} column${cols.length!==1?'s':''} ${rd?'(including renewal as leftmost)':''}</span>
    <span class="spacer"></span>
    <span class="preview-info">Edits made: ${Object.keys((S.previewEdits[S.editingGroupId||'current']||{})).length} plan${Object.keys((S.previewEdits[S.editingGroupId||'current']||{})).length!==1?'s':''}</span>
  </div>

  <div class="preview-table-wrap">
    <table class="ptbl">
      <thead>
        <tr class="carrier-row">
          <th rowspan="2" class="label-cell" style="background:var(--primary)!important;color:white">Field</th>
          ${carrierHeaderHtml}
        </tr>
        <tr class="plan-row">
          ${planHeaderHtml}
        </tr>
      </thead>
      <tbody>${body}</tbody>
    </table>
  </div>

  ${savingsHtml}

  <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:1rem">
    <button class="btn btn-ghost" onclick="set({step:3})">← Back</button>
    <button class="btn btn-primary" onclick="saveGroupAndContinue()">Looks Good — Save Group →</button>
  </div>`;
}

function onPreviewEdit(event, planId, fieldKey, isNumeric) {
  let val = event.target.innerText.trim();
  if (isNumeric) {
    const cleaned = val.replace(/[^\d.\-]/g, '');
    val = cleaned === '' ? '' : Number(cleaned);
    // Reformat display
    if (val !== '') event.target.innerText = fmtRate(val);
  }
  setPreviewEdit(planId, fieldKey, val);
}

function saveGroupAndContinue() {
  // Save the working state as a Group
  const id = S.editingGroupId || 'g_' + Date.now();
  const plans = getPreviewPlans();

  // Apply preview edits to the carriers data permanently
  const editsKey = S.editingGroupId || 'current';
  const edits = S.previewEdits[editsKey] || {};
  const finalCarriers = JSON.parse(JSON.stringify(S.carriers));
  Object.keys(edits).forEach(pid => {
    const [ci, pi] = pid.split('-').map(Number);
    if (finalCarriers[ci] && finalCarriers[ci].plans && finalCarriers[ci].plans[pi]) {
      Object.assign(finalCarriers[ci].plans[pi], edits[pid]);
    }
  });

  const groupData = {
    id,
    clientName: S.clientName,
    quoteType: S.quoteType,
    carriers: finalCarriers,
    renewalData: S.renewalData,
    selectedPlanIdsList: Array.from(S.selectedPlanIds),
    bundleSelections: JSON.parse(JSON.stringify(S.bundleSelections || {})),
    selectedCount: S.selectedPlanIds.size,
    ready: true
  };

  // Move edits under the new group id if it was a temp id
  if (editsKey === 'current') {
    S.previewEdits[id] = S.previewEdits['current'] || {};
    delete S.previewEdits['current'];
  }

  if (S.editingGroupId) {
    const idx = S.groups.findIndex(g => g.id === id);
    if (idx >= 0) S.groups[idx] = groupData;
    else S.groups.push(groupData);
  } else {
    S.groups.push(groupData);
  }

  // Reset working state and go back to dashboard
  Object.assign(S, {
    view: 'dashboard',
    step: 0,
    files: [],
    clientName: '',
    carriers: [],
    renewalData: null,
    selectedPlanIds: new Set(),
    editingGroupId: null,
    info: `✓ Group "${groupData.clientName}" saved.`
  });
  render();
}

// ─── STEP 5: COMPLETE ─────────────────────────────────────────────────────────
function viewComplete() {
  return `<div class="card" style="text-align:center;padding:3rem">
    <div style="font-size:48px;margin-bottom:1rem">✅</div>
    <div style="font-size:20px;font-weight:600;margin-bottom:8px">Group saved</div>
    <div style="font-size:13px;color:var(--gray-600);margin-bottom:1.5rem">Returning to dashboard...</div>
  </div>`;
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function resetApp() {
  Object.assign(S, {
    view: 'dashboard',
    step: 0, files: [], clientName: "", quoteType: 'single', bundleSelections: {},
    carriers: [], renewalData: null, selectedPlanIds: new Set(),
    editingGroupId: null,
    filter: "all", sort: "carrier", error: "", warn: "", info: ""
  });
  render();
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function fileToArrayBuffer(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}
function escHtml(s) {
  return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function attachDropEvents() {
  const el = document.getElementById("dz-pdfs");
  if (el) {
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("over"); });
    el.addEventListener("dragleave", () => el.classList.remove("over"));
    el.addEventListener("drop", e => {
      e.preventDefault();
      el.classList.remove("over");
      const files = Array.from(e.dataTransfer.files);
      const pdfs = files.filter(f => f.name.match(/\.pdf$/i));
      if (pdfs.length) {
        const newFiles = pdfs.map(file => ({
          file, role: detectRole(file.name), pageRange: '', pageCount: null,
          status: 'idle', data: null, error: null
        }));
        S.files = [...S.files, ...newFiles];
        render();
        updateGoBtn();
        newFiles.forEach((f) => {
          const idx = S.files.indexOf(f);
          loadPageCount(f.file).then(c => { S.files[idx].pageCount = c; if (S.step === 1) render(); });
        });
      }
    });
  }
}

checkAuth();
setTimeout(updateGoBtn, 100);
